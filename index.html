// ===== متغيرات الحالة العامة =====

function updateStatus(message, isError = false) {
  statusText.innerHTML = message;
  statusText.style.color = isError ? '#ff6b6b' : '#cbd5e1';

function genId() {
  return 'u_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

function getMyName() {
  return (nameInput.value || '').trim() || (isHost ? 'المضيف' : 'مشاهد');

// ===== إدارة بطاقات المستخدمين (فيديو/صوت) =====
function ensurePeerTile(peerId, label) {
  let tile = document.getElementById('tile-' + peerId);
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'people-tile';
    tile.id = 'tile-' + peerId;
    tile.innerHTML = `
      <video id="vid-${peerId}" autoplay playsinline></video>
      <div class="tile-label" id="label-${peerId}">${label || 'مستخدم'}</div>
    `;
    peopleGrid.appendChild(tile);
  }
  return tile;
}

function removePeerTile(peerId) {
  const tile = document.getElementById('tile-' + peerId);
  if (tile) tile.remove();
}

function setTileLabel(peerId, label) {
  const el = document.getElementById('label-' + peerId);
  if (el) el.innerText = label;
}

// ===== تنظيف =====
async function cleanupAll() {
  for (const peerId in peers) {
    closePeerConnection(peerId);
  }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  if (deviceAudioStream) { deviceAudioStream.getTracks().forEach(t => t.stop()); deviceAudioStream = null; }
  if (localMicStream) { localMicStream.getTracks().forEach(t => t.stop()); localMicStream = null; }
  if (localCamStream) { localCamStream.getTracks().forEach(t => t.stop()); localCamStream = null; }
  isScreenSharing = false;
  isDeviceAudioSharing = false;
  isMicOn = false;
  isCamOn = false;
  peopleGrid.innerHTML = '';
}

function closePeerConnection(peerId) {
  const p = peers[peerId];
  if (!p) return;
  if (p.pc) p.pc.close();
  removePeerTile(peerId);
  delete peers[peerId];
}

window.addEventListener('beforeunload', () => {
  if (roomId && myId) {
    // محاولة تنظيف (لا ضمان للنجاح قبل الإغلاق)
    remove(ref(db, `rooms/${roomId}/participants/${myId}`));
  }
});

// ===========================================================
// إنشاء اتصال Mesh مع مستخدم آخر (متماثل لكل المستخدمين)
// initiator: true إن كان معرفنا "أكبر" (لتفادي تعارض العروض)
// ===========================================================
function createPeerConnection(peerId, initiator) {
  if (peers[peerId] && peers[peerId].pc) return peers[peerId].pc;

  const pc = new RTCPeerConnection(iceServers);
  peers[peerId] = { pc, makingOffer: false, polite: !initiator };

  ensurePeerTile(peerId);

  // أضف كل المسارات المحلية الحالية إلى الاتصال الجديد
  addAllLocalTracks(pc);

  pc.ontrack = (event) => {
    const remoteStream = event.streams[0];
    if (event.track.kind === 'video') {
      const vidEl = document.getElementById('vid-' + peerId);
      if (vidEl && vidEl.srcObject !== remoteStream) {
        vidEl.srcObject = remoteStream;
        vidEl.play().catch(() => {});
      }
    } else if (event.track.kind === 'audio') {
      // أنشئ عنصر صوت مخفي لتشغيل صوت هذا المستخدم
      let audioEl = document.getElementById('audio-' + peerId);
      if (!audioEl) {
        audioEl = document.createElement('audio');
        audioEl.id = 'audio-' + peerId;
        audioEl.autoplay = true;
        audioEl.style.display = 'none';
        document.body.appendChild(audioEl);
      }
      if (audioEl.srcObject !== remoteStream) {
        audioEl.srcObject = remoteStream;
        audioEl.play().catch(() => {});
      }
    }
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      push(ref(db, `rooms/${roomId}/signals/${peerId}/${myId}/candidates`), event.candidate.toJSON());
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
      // محاولة لاحقة عند الحاجة
    }
  };

  pc.onnegotiationneeded = async () => {
    try {
      peers[peerId].makingOffer = true;
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await set(ref(db, `rooms/${roomId}/signals/${peerId}/${myId}/offer`), { type: offer.type, sdp: offer.sdp });
    } catch (e) {
      console.error("negotiation error", e);
    } finally {
      peers[peerId].makingOffer = false;
    }
  };

  // استمع لإشارات الطرف الآخر الموجهة إلينا
  listenForSignals(peerId);

  return pc;
}

function addAllLocalTracks(pc) {
  const streamsToAdd = [];
  if (isHost && screenStream) streamsToAdd.push(screenStream);
  if (isHost && deviceAudioStream) streamsToAdd.push(deviceAudioStream);
  if (localMicStream) streamsToAdd.push(localMicStream);
  if (localCamStream) streamsToAdd.push(localCamStream);

  streamsToAdd.forEach(stream => {
    stream.getTracks().forEach(track => {
      const already = pc.getSenders().some(s => s.track === track);
      if (!already) pc.addTrack(track, stream);
    });
  });
}

// استماع لقناة إشارات: rooms/{roomId}/signals/{myId}/{fromPeerId} = offer/answer/candidates التي يرسلها fromPeerId إلينا
function listenForSignals(peerId) {
  const sigRef = ref(db, `rooms/${roomId}/signals/${myId}/${peerId}`);

  onValue(ref(db, `rooms/${roomId}/signals/${myId}/${peerId}/offer`), async (snapshot) => {
    const offer = snapshot.val();
    if (!offer) return;
    const pc = peers[peerId] && peers[peerId].pc;
    if (!pc) return;

    const collision = pc.signalingState !== 'stable';
    const polite = peers[peerId].polite;

    if (collision && !polite) {
      return; // المهذب يتنازل
    }

    try {
      if (collision && polite) {
        await Promise.all([
          pc.setLocalDescription({ type: 'rollback' }),
          pc.setRemoteDescription(new RTCSessionDescription(offer))
        ]);
      } else {
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
      }
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await set(ref(db, `rooms/${roomId}/signals/${peerId}/${myId}/answer`), { type: answer.type, sdp: answer.sdp });
    } catch (e) {
      console.error("offer handling error", e);
    }
  });

  onValue(ref(db, `rooms/${roomId}/signals/${myId}/${peerId}/answer`), async (snapshot) => {
    const answer = snapshot.val();
    if (!answer) return;
    const pc = peers[peerId] && peers[peerId].pc;
    if (!pc) return;
    if (pc.signalingState === 'have-local-offer') {
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
      } catch (e) {
        console.error("answer handling error", e);
      }
    }
  });

  onChildAdded(ref(db, `rooms/${roomId}/signals/${myId}/${peerId}/candidates`), (snapshot) => {
    const pc = peers[peerId] && peers[peerId].pc;
    if (pc && snapshot.exists()) {
      pc.addIceCandidate(new RTCIceCandidate(snapshot.val())).catch(console.error);
    }
  });
}

// ===========================================================
// الانضمام/استضافة الغرفة + إدارة قائمة المشاركين
// ===========================================================
function watchParticipants() {
  const participantsRef = ref(db, `rooms/${roomId}/participants`);

  onChildAdded(participantsRef, async (snapshot) => {
    const peerId = snapshot.key;
    if (peerId === myId) return;
    const data = snapshot.val() || {};
    ensurePeerTile(peerId, data.name || 'مستخدم');
    setTileLabel(peerId, data.name || 'مستخدم');

    // قرر من يبدأ العرض (الـ initiator) بمقارنة المعرفات لتفادي ازدواج الاتصال
    const initiator = myId > peerId;
    createPeerConnection(peerId, initiator);
  });

  onValue(participantsRef, (snapshot) => {
    const data = snapshot.val() || {};
    Object.keys(data).forEach(peerId => {
      if (peerId !== myId) setTileLabel(peerId, data[peerId].name || 'مستخدم');
    });
  });

  onChildRemoved(participantsRef, (snapshot) => {
    const peerId = snapshot.key;
    if (peerId === myId) return;
    closePeerConnection(peerId);
  });
}

// ===== الدردشة النصية =====
function watchChat() {
  onChildAdded(ref(db, `rooms/${roomId}/chat`), (snapshot) => {
    const msg = snapshot.val();
    if (!msg) return;
    addChatLine(msg.name, msg.text, msg.senderId === myId);
  });
}

function addChatLine(name, text, isMine) {
  const div = document.createElement('div');
  div.className = 'chat-line' + (isMine ? ' chat-mine' : '');
  div.innerHTML = `<span class="chat-name">${escapeHtml(name)}:</span> ${escapeHtml(text)}`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.innerText = str;
  return div.innerHTML;
}

btnChatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !roomId) return;
  push(ref(db, `rooms/${roomId}/chat`), {
    name: getMyName(),
    text,
    senderId: myId,
    ts: Date.now()
  });
  chatInput.value = '';
}

btnHost.addEventListener('click', async () => {
  try {
    await cleanupAll();
    isHost = true;
    myId = genId();
    roomId = Math.floor(1000 + Math.random() * 9000).toString();
    displayRoomCode.innerText = roomId;

    switchScreen(welcomeScreen, roomScreen);
    hostControlArea.style.display = "block";
    remoteVideo.style.display = "none";
    sharedFrame.style.display = "none";
    updateStatus("✅ تم فتح الغرفة. شارك الكود مع أصدقائك.");

    const roomRef = ref(db, `rooms/${roomId}`);
    await remove(roomRef);
    onDisconnect(ref(db, `rooms/${roomId}/participants/${myId}`)).remove();

    await set(ref(db, `rooms/${roomId}/participants/${myId}`), { name: getMyName(), host: true, ts: Date.now() });

    watchParticipants();
    watchChat();

  } catch (error) {
    updateStatus(`❌ خطأ: ${error.message}`, true);
  }
});

// مشاركة الشاشة (فيديو فقط بدون صوت)
btnShareScreen.addEventListener('click', async () => {
  if (isScreenSharing) {
    if (screenStream) screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    isScreenSharing = false;
    btnShareScreen.textContent = "🖥️ مشاركة الشاشة";
    removeTrackKindFromAllPeers('video', 'screen');
    updateStatus("🖥️ تم إيقاف مشاركة الشاشة");
    return;
  }

  updateStatus("🖥️ جاري مشاركة الشاشة...");
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 30, max: 60 }, width: { ideal: 1920, max: 1920 }, height: { ideal: 1080, max: 1080 } },
      audio: false
    });

    isScreenSharing = true;
    updateStatus("✅ تم مشاركة الشاشة بنجاح!");

    const videoTrack = screenStream.getVideoTracks()[0];
    addTrackToAllPeers(videoTrack, screenStream);

    videoTrack.onended = () => {
      isScreenSharing = false;
      btnShareScreen.textContent = "🖥️ مشاركة الشاشة";
      updateStatus("⚠️ توقفت مشاركة الشاشة", true);
    };

    btnShareScreen.textContent = "✅ الشاشة قيد البث";
  } catch (error) {
    updateStatus(`❌ فشل مشاركة الشاشة: ${error.message}`, true);
  }
});

// بث صوت الجهاز (مستقل) - للمضيف
btnShareAudio.addEventListener('click', async () => {
  if (isDeviceAudioSharing) {
    if (deviceAudioStream) deviceAudioStream.getTracks().forEach(t => t.stop());
    deviceAudioStream = null;
    isDeviceAudioSharing = false;
    btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
    removeTrackKindFromAllPeers('audio', 'deviceAudio');
    updateStatus("🔇 تم إيقاف بث صوت الجهاز");
    return;
  }

  updateStatus("🎵 جاري تشغيل صوت الجهاز...");
  try {
    const tempStream = await navigator.mediaDevices.getDisplayMedia({
      video: { width: { ideal: 1, max: 1 }, height: { ideal: 1, max: 1 }, frameRate: 1 },
      audio: true
    });

    const audioTrack = tempStream.getAudioTracks()[0];
    if (audioTrack) {
      deviceAudioStream = new MediaStream();
      deviceAudioStream.addTrack(audioTrack);
      isDeviceAudioSharing = true;

      addTrackToAllPeers(audioTrack, deviceAudioStream);

      updateStatus("🎵 تم تشغيل صوت الجهاز! الضيوف الآن يسمعون صوت جهازك.");
      btnShareAudio.textContent = "🔇 إيقاف صوت الجهاز";

      audioTrack.onended = () => {
        isDeviceAudioSharing = false;
        btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
        updateStatus("⚠️ توقف بث صوت الجهاز", true);
      };

      tempStream.getVideoTracks().forEach(t => t.stop());
    } else {
      updateStatus("❌ لم يتم العثور على مسار صوت", true);
      tempStream.getTracks().forEach(t => t.stop());
    }
  } catch (error) {
    updateStatus(`❌ فشل تشغيل صوت الجهاز: ${error.message}. تأكد من اختيار "مشاركة الصوت" في النافذة المنبثقة.`, true);
  }
});

// رابط الموقع
btnSendUrl.addEventListener('click', () => {
  let url = urlInput.value.trim();
  if (!url) {
    updateStatus("⚠️ الرجاء إدخال الرابط أولاً", true);
    return;
  }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  sharedFrame.src = url;
  sharedFrame.style.display = "block";
  updateStatus("📺 تم تحميل الموقع.");
});

btnJoin.addEventListener('click', async () => {
  try {
    await cleanupAll();
    isHost = false;
    myId = genId();
    roomId = roomCodeInput.value.trim();

    if (!roomId || roomId.length !== 4) {
      updateStatus("⚠️ كود الغرفة يجب أن يكون 4 أرقام", true);
      return;
    }

    updateStatus("🔍 جاري البحث عن الغرفة...");

    const roomSnapshot = await get(ref(db, `rooms/${roomId}`));
    if (!roomSnapshot.exists()) {
      updateStatus("❌ الغرفة غير موجودة. تأكد من الكود.", true);
      return;
    }

    switchScreen(welcomeScreen, roomScreen);
    displayRoomCode.innerText = roomId;
    sharedFrame.style.display = "none";
    remoteVideo.style.display = "block";
    hostControlArea.style.display = "none";

    onDisconnect(ref(db, `rooms/${roomId}/participants/${myId}`)).remove();
    await set(ref(db, `rooms/${roomId}/participants/${myId}`), { name: getMyName(), host: false, ts: Date.now() });

    updateStatus("📡 جاري الاتصال بالغرفة...");
    watchParticipants();
    watchChat();

  } catch (error) {
    updateStatus(`❌ خطأ: ${error.message}`, true);
  }
});

// ===========================================================
// المايكروفون والكاميرا (لكل المستخدمين)
// ===========================================================
btnMic.addEventListener('click', async () => {
  if (isMicOn) {
    if (localMicStream) localMicStream.getTracks().forEach(t => t.stop());
    localMicStream = null;
    isMicOn = false;
    btnMic.textContent = "🎤 تشغيل المايك";
    btnMic.classList.remove('btn-active');
    removeTrackKindFromAllPeers('audio', 'mic');
    updateStatus("🔇 تم إيقاف المايكروفون");
    return;
  }

  try {
    localMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    isMicOn = true;
    btnMic.textContent = "🔇 إيقاف المايك";
    btnMic.classList.add('btn-active');
    addTrackToAllPeers(localMicStream.getAudioTracks()[0], localMicStream);
    updateStatus("🎤 المايكروفون يعمل");
  } catch (error) {
    updateStatus(`❌ فشل تشغيل المايك: ${error.message}`, true);
  }
});

btnCam.addEventListener('click', async () => {
  if (isCamOn) {
    if (localCamStream) localCamStream.getTracks().forEach(t => t.stop());
    localCamStream = null;
    isCamOn = false;
    btnCam.textContent = "📷 تشغيل الكاميرا";
    btnCam.classList.remove('btn-active');
    localCamVideo.style.display = 'none';
    localCamVideo.srcObject = null;
    removeTrackKindFromAllPeers('video', 'cam');
    updateStatus("📷 تم إيقاف الكاميرا");
    return;
  }

  try {
    localCamStream = await navigator.mediaDevices.getUserMedia({ video: true });
    isCamOn = true;
    btnCam.textContent = "📷 إيقاف الكاميرا";
    btnCam.classList.add('btn-active');
    localCamVideo.srcObject = localCamStream;
    localCamVideo.style.display = 'block';
    addTrackToAllPeers(localCamStream.getVideoTracks()[0], localCamStream);
    updateStatus("📷 الكاميرا تعمل");
  } catch (error) {
    updateStatus(`❌ فشل تشغيل الكاميرا: ${error.message}`, true);
  }
});

// ===== أدوات مساعدة لإضافة/إزالة مسارات من كل الاتصالات =====
function addTrackToAllPeers(track, stream) {
  Object.values(peers).forEach(p => {
    if (!p.pc) return;
    const already = p.pc.getSenders().some(s => s.track === track);
    if (!already) p.pc.addTrack(track, stream);
  });
}

// kind: 'audio'|'video', tag غير مستخدم فعليًا للتمييز هنا (تبسيط) - نزيل أي مسار من هذا النوع
// توقف عند هذه النقطة لكون onnegotiationneeded سيعيد التفاوض تلقائياً
function removeTrackKindFromAllPeers(kind, tag) {
  Object.values(peers).forEach(p => {
    if (!p.pc) return;
    p.pc.getSenders().filter(s => s.track && s.track.kind === kind).forEach(s => {
      try { p.pc.removeTrack(s); } catch (e) {}
    });
  });
}

function switchScreen(hide, show) {
  hide.classList.remove('active');
  show.classList.add('active');
}

remoteVideo.addEventListener('click', () => {
  if (remoteVideo.srcObject && remoteVideo.paused) remoteVideo.play().catch(() => {});
});

document.body.addEventListener('click', () => {
  document.querySelectorAll('video').forEach(v => {
    if (v.srcObject && v.paused) v.play().catch(() => {});
  });
});
