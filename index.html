<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>سينما لايف - بث احترافي | يدعم 4G</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
    }

    .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 28px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 1000px;
        overflow: hidden;
    }

    .screen {
        display: none;
        padding: 24px;
        animation: fadeIn 0.5s ease;
    }

    .screen.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        font-size: 28px;
        margin-bottom: 24px;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .btn {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .btn:active {
        transform: scale(0.98);
    }

    .btn-secondary {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .btn-success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .btn-warning {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    input {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border: 2px solid #e0e0e0;
        border-radius: 14px;
        font-size: 18px;
        text-align: center;
        font-weight: bold;
        letter-spacing: 4px;
        transition: border-color 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #667eea;
    }

    .status {
        background: #f0f0f0;
        padding: 12px;
        border-radius: 12px;
        margin: 16px 0;
        text-align: center;
        font-size: 14px;
        color: #333;
        border-right: 4px solid #667eea;
    }

    .status.error {
        background: #fee;
        border-right-color: #f5576c;
        color: #c00;
    }

    .status.success {
        background: #e8f5e9;
        border-right-color: #4caf50;
        color: #2e7d32;
    }

    .status.warning {
        background: #fff3e0;
        border-right-color: #ff9800;
        color: #e65100;
    }

    .control-box {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 20px;
        margin: 20px 0;
    }

    .buttons-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 15px;
    }

    .viewer-container {
        position: relative;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        aspect-ratio: 16/9;
        margin-top: 20px;
    }

    video, iframe {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
    }

    .network-badge {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-family: monospace;
        z-index: 1000;
    }

    .guest-count {
        background: #667eea;
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        display: inline-block;
        margin-bottom: 15px;
    }

    @media (max-width: 768px) {
        .screen { padding: 16px; }
        h1 { font-size: 24px; }
        .buttons-group { grid-template-columns: 1fr; }
    }

    .warning-banner {
        background: #ff9800;
        color: white;
        padding: 10px;
        border-radius: 12px;
        margin-bottom: 15px;
        font-size: 13px;
        text-align: center;
    }

    .hidden {
        display: none;
    }

    .video-preview {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 120px;
        height: 90px;
        border-radius: 8px;
        border: 2px solid white;
        z-index: 10;
        background: #000;
    }

    /* مؤشر تحميل */
    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<body>

<div class="container">
    <!-- شاشة الترحيب -->
    <div id="welcome-screen" class="screen active">
        <h1>🎬 سينما لايف برو</h1>
        <div class="warning-banner">
            📱 نظام بث احترافي - يدعم جميع شبكات 4G و 5G و WiFi<br>
            ✨ يعمل عبر خوادم TURN العالمية
        </div>
        <button id="btn-host" class="btn">🚀 إنشاء غرفة بث (مضيف)</button>
        <div style="text-align: center; margin: 15px 0; color: #999;">أو</div>
        <input type="text" id="room-code-input" placeholder="📱 أدخل كود الغرفة (4 أرقام)" maxlength="4" inputmode="numeric">
        <button id="btn-join" class="btn btn-secondary">👥 انضم كمشاهد</button>
    </div>

    <!-- شاشة الغرفة -->
    <div id="room-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h1 style="margin: 0; font-size: 20px;">🏠 غرفة: <span id="display-room-code">----</span></h1>
            <div id="guest-count-badge" class="guest-count">👥 0 ضيوف</div>
        </div>
        
        <div id="status-text" class="status">⚙️ جاري التهيئة...</div>
        
        <!-- منطقة تحكم المضيف -->
        <div id="host-control-area" class="hidden">
            <div class="control-box">
                <div class="buttons-group">
                    <button id="btn-share-screen" class="btn btn-success">🖥️ مشاركة الشاشة</button>
                    <button id="btn-share-audio" class="btn btn-warning">🎵 بث صوت الجهاز</button>
                </div>
                
                <div style="font-size: 12px; color: #666; margin-top: 12px; text-align: center;">
                    💡 نصيحة: شارك الشاشة أولاً، ثم شغّل الصوت. البث يدعم حتى 10 مشاهدين على بيانات الجوال!
                </div>
            </div>
        </div>
        
        <!-- منطقة عرض الفيديو -->
        <div class="viewer-container">
            <video id="remote-video" autoplay playsinline controls muted></video>
        </div>
    </div>
</div>

<div id="network-badge" class="network-badge">📡 جاري التحقق...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onChildAdded, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
        authDomain: "my-online-store-34f34.firebaseapp.com",
        databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-online-store-34f34",
        storageBucket: "my-online-store-34f34.firebasestorage.app",
        messagingSenderId: "288655549705",
        appId: "1:288655549705:web:06901ce4ac1a50eebe1fd8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ==============================================
    // 🔥 تكوين TURN المحسن - إزالة الخوادم غير الموثوقة
    // ==============================================
    // ملاحظة: يجب استبدال هذه البيانات ببيانات حقيقية من Xirsys API
    // للحصول على بيانات صالحة، استخدم: https://global.xirsys.net/_turn/yourAppName
    const TURN_CONFIG = {
        username: "anis",  // يجب استبداله بالبيانات الفعلية من Xirsys
        credential: "e106fc76-672c-11f1-8b93-0242ac130002"  // يجب استبداله بالبيانات الفعلية من Xirsys
    };

    // خوادم TURN محسنة - فقط خوادم موثوقة
    const getIceServers = () => {
        return {
            iceServers: [
                // استخدام TURN فقط (بدون STUN) لضمان المرور عبر CGNAT
                {
                    urls: [
                        "turns:global.xirsys.net:443?transport=tcp",
                        "turn:global.xirsys.net:3478?transport=udp"
                    ],
                    username: TURN_CONFIG.username,
                    credential: TURN_CONFIG.credential
                },
                // خادم احتياطي - Twilio (مجاني ومستقر)
                {
                    urls: "turn:global.turn.twilio.com:3478?transport=udp",
                    username: "any_username",  // يجب استبداله ببيانات Twilio الفعلية
                    credential: "any_credential"
                }
            ],
            iceTransportPolicy: 'relay',  // إجبار استخدام TURN فقط
            bundlePolicy: 'max-bundle',
            rtcpMuxPolicy: 'require',
            iceCandidatePoolSize: 0  // تقليل الاستهلاك
        };
    };

    const MAX_GUESTS = 10;
    let peerConnection = null;
    let hostPeerConnections = {};
    let videoStream = null;
    let audioStream = null;
    let roomId = null;
    let isHost = false;
    let myGuestId = null;
    let reconnectAttempts = 0;
    let restartIceTimeout = null;
    
    // ============ قوائم انتظار ICE Candidates ============
    let pendingHostCandidates = [];
    let pendingGuestCandidates = {};

    // عناصر DOM
    const welcomeScreen = document.getElementById('welcome-screen');
    const roomScreen = document.getElementById('room-screen');
    const btnHost = document.getElementById('btn-host');
    const btnJoin = document.getElementById('btn-join');
    const roomCodeInput = document.getElementById('room-code-input');
    const displayRoomCode = document.getElementById('display-room-code');
    const remoteVideo = document.getElementById('remote-video');
    const statusText = document.getElementById('status-text');
    const hostControlArea = document.getElementById('host-control-area');
    const btnShareScreen = document.getElementById('btn-share-screen');
    const btnShareAudio = document.getElementById('btn-share-audio');
    const guestCountBadge = document.getElementById('guest-count-badge');
    const networkBadge = document.getElementById('network-badge');

    // تحديث حالة الشبكة
    async function checkNetworkType() {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (connection) {
            const type = connection.effectiveType || 'unknown';
            networkBadge.innerHTML = `📡 ${type} | TURN Active`;
            return type;
        }
        networkBadge.innerHTML = `📡 TURN Active`;
        return 'unknown';
    }

    function updateStatus(message, type = 'info') {
        statusText.innerHTML = message;
        if (type === 'error') {
            statusText.className = 'status error';
        } else if (type === 'success') {
            statusText.className = 'status success';
        } else if (type === 'warning') {
            statusText.className = 'status warning';
        } else {
            statusText.className = 'status';
        }
        console.log(`[${type.toUpperCase()}] ${message}`);
    }

    function updateGuestCount(count) {
        guestCountBadge.innerHTML = `👥 ${count} ${count === 1 ? 'ضيف' : 'ضيوف'}`;
    }

    // تنظيف الموارد بالكامل
    async function cleanupConnection() {
        if (restartIceTimeout) {
            clearTimeout(restartIceTimeout);
            restartIceTimeout = null;
        }
        
        // تنظيف قوائم الانتظار
        pendingHostCandidates = [];
        pendingGuestCandidates = {};
        
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
        }
        if (audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
            audioStream = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        for (let guestId in hostPeerConnections) {
            try {
                hostPeerConnections[guestId].close();
            } catch(e) {}
            delete hostPeerConnections[guestId];
        }
    }

    // إضافة مسار لجميع الضيوف
    async function addTrackToAllConnections(track, stream) {
        for (let guestId in hostPeerConnections) {
            const pc = hostPeerConnections[guestId];
            if (pc && pc.connectionState !== 'closed') {
                try {
                    const sender = pc.getSenders().find(s => s.track?.kind === track.kind);
                    if (sender) {
                        await sender.replaceTrack(track);
                    } else {
                        pc.addTrack(track, stream);
                    }
                } catch(e) {
                    console.error(`Error adding track to guest ${guestId}:`, e);
                }
            }
        }
    }

    // ============== المضيف ==============
    btnHost.addEventListener('click', async () => {
        try {
            await cleanupConnection();
            isHost = true;
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            displayRoomCode.innerText = roomId;
            
            switchScreen(welcomeScreen, roomScreen);
            hostControlArea.classList.remove('hidden');
            remoteVideo.style.display = "block";
            remoteVideo.muted = true;
            
            updateStatus(`✅ تم إنشاء الغرفة رقم ${roomId}. شارك الكود مع أصدقائك!`, 'success');
            
            const roomRef = ref(db, `rooms/${roomId}`);
            await remove(roomRef);
            await set(ref(db, `rooms/${roomId}/createdAt`), Date.now());
            await set(ref(db, `rooms/${roomId}/host`), "active");
            onDisconnect(roomRef).remove();
            
            // مراقبة عدد الضيوف
            onValue(ref(db, `rooms/${roomId}/guests`), (snapshot) => {
                const guests = snapshot.val() || {};
                const count = Object.keys(guests).length;
                updateGuestCount(count);
            });
            
            // الاستماع للضيوف الجدد مع تنظيف المستمعات القديمة
            const guestsRef = ref(db, `rooms/${roomId}/guests`);
            onChildAdded(guestsRef, (snapshot) => {
                const guestId = snapshot.key;
                if (!hostPeerConnections[guestId]) {
                    updateStatus(`👤 ضيف جديد انضم للغرفة! جاري الاتصال...`, 'info');
                    setupWebrtcForGuest(guestId);
                }
            });
            
        } catch (error) {
            updateStatus(`❌ خطأ: ${error.message}`, 'error');
        }
    });

    // إعداد اتصال WebRTC للضيف - نسخة محسنة
    async function setupWebrtcForGuest(guestId) {
        const pc = new RTCPeerConnection(getIceServers());
        hostPeerConnections[guestId] = pc;
        pendingGuestCandidates[guestId] = [];
        
        // إضافة المسارات الحالية
        if (videoStream) {
            const videoTrack = videoStream.getVideoTracks()[0];
            if (videoTrack) {
                pc.addTrack(videoTrack, videoStream);
            }
        }
        if (audioStream) {
            const audioTrack = audioStream.getAudioTracks()[0];
            if (audioTrack) {
                pc.addTrack(audioTrack, audioStream);
            }
        }
        
        // معالجة مرشحات ICE
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                const candidateRef = ref(
                    db, 
                    `rooms/${roomId}/guests/${guestId}/hostCandidates/${Date.now()}_${Math.random().toString(36).slice(2, 8)}`
                );
                set(candidateRef, event.candidate.toJSON());
            }
        };
        
        pc.oniceconnectionstatechange = () => {
            console.log(`[Host-${guestId}] ICE State: ${pc.iceConnectionState}`);
            if (pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") {
                updateStatus(`✅ تم اتصال ضيف بنجاح عبر TURN`, 'success');
            } else if (pc.iceConnectionState === "failed") {
                updateStatus(`⚠️ فشل الاتصال مع الضيف، إعادة تهيئة ICE...`, 'warning');
                try {
                    pc.restartIce();
                } catch (e) {
                    console.error(e);
                }
            }
        };
        
        // استقبال الرد من الضيف
        onValue(ref(db, `rooms/${roomId}/guests/${guestId}/answer`), async (snapshot) => {
            const answer = snapshot.val();
            if (answer && pc.signalingState === "have-local-offer") {
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(answer));
                    const queued = pendingGuestCandidates[guestId] || [];
                    for (const c of queued) {
                        await pc.addIceCandidate(new RTCIceCandidate(c));
                    }
                    pendingGuestCandidates[guestId] = [];
                } catch (e) {
                    console.error("setRemoteDescription(answer) failed:", e);
                }
            }
        });
        
        // استقبال مرشحات الضيف
        onChildAdded(ref(db, `rooms/${roomId}/guests/${guestId}/guestCandidates`), async (snapshot) => {
            if (!snapshot.exists()) return;
            const candidate = snapshot.val();
            try {
                if (pc.remoteDescription) {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                } else {
                    pendingGuestCandidates[guestId].push(candidate);
                }
            } catch (e) {
                console.error("Host addIceCandidate failed:", e);
            }
        });
        
        // إنشاء العرض
        try {
            const offer = await pc.createOffer({
                offerToReceiveAudio: true,
                offerToReceiveVideo: true
            });
            await pc.setLocalDescription(offer);
            await update(ref(db, `rooms/${roomId}/guests/${guestId}`), {
                offer: {
                    type: offer.type,
                    sdp: offer.sdp
                }
            });
        } catch (error) {
            console.error("Negotiation error:", error);
            updateStatus(`❌ فشل إنشاء الاتصال مع الضيف`, 'error');
        }
    }

    // مشاركة الشاشة - جودة مخففة لشبكات 4G
    btnShareScreen.addEventListener('click', async () => {
        try {
            updateStatus("🖥️ جاري مشاركة الشاشة (جودة منخفضة لـ 4G)...", 'info');
            
            // جودة مخففة لتناسب شبكات الجوال
            videoStream = await navigator.mediaDevices.getDisplayMedia({
                video: { 
                    frameRate: { ideal: 15, max: 24 },  // تقليل الإطارات
                    width: { ideal: 854, max: 1280 },   // خفض الدقة
                    height: { ideal: 480, max: 720 }
                },
                audio: true  // التقاط الصوت مع الشاشة مباشرة
            });
            
            // التعامل مع مسار الفيديو
            const videoTrack = videoStream.getVideoTracks()[0];
            if (videoTrack) {
                await addTrackToAllConnections(videoTrack, videoStream);
            }
            
            // التعامل مع مسار الصوت
            const audioTrack = videoStream.getAudioTracks()[0];
            if (audioTrack) {
                audioStream = new MediaStream([audioTrack]);
                await addTrackToAllConnections(audioTrack, audioStream);
                btnShareAudio.textContent = "🔇 إيقاف صوت الجهاز";
            }
            
            updateStatus("✅ جاري بث الشاشة والصوت لجميع المشاهدين (عبر TURN - يدعم 4G)!", 'success');
            btnShareScreen.textContent = "✅ الشاشة قيد البث";
            
            // إظهار معاينة للمضيف
            const previewVideo = document.createElement('video');
            previewVideo.srcObject = videoStream;
            previewVideo.autoplay = true;
            previewVideo.muted = true;
            previewVideo.className = 'video-preview';
            document.querySelector('.viewer-container').appendChild(previewVideo);
            
            videoTrack.onended = () => {
                updateStatus("⚠️ توقفت مشاركة الشاشة", 'warning');
                btnShareScreen.textContent = "🖥️ مشاركة الشاشة";
                if (previewVideo) previewVideo.remove();
            };
        } catch (error) {
            updateStatus(`❌ فشل مشاركة الشاشة: ${error.message}`, 'error');
        }
    });
    
    // بث الصوت - محسن
    btnShareAudio.addEventListener('click', async () => {
        if (audioStream) {
            audioStream.getTracks().forEach(t => t.stop());
            audioStream = null;
            updateStatus("🔇 تم إيقاف بث الصوت", 'info');
            btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
            return;
        }
        
        try {
            updateStatus("🎵 جاري تشغيل صوت الجهاز...", 'info');
            
            // التقاط صوت النظام فقط
            const tempStream = await navigator.mediaDevices.getDisplayMedia({
                video: { width: 1, height: 1 },  // فيديو وهمي للسماح بالصوت
                audio: true
            });
            
            const audioTrack = tempStream.getAudioTracks()[0];
            if (audioTrack) {
                audioStream = new MediaStream([audioTrack]);
                await addTrackToAllConnections(audioTrack, audioStream);
                updateStatus("✅ يتم بث صوت الجهاز لجميع المشاهدين (عبر TURN)!", 'success');
                btnShareAudio.textContent = "🔇 إيقاف صوت الجهاز";
                
                audioTrack.onended = () => {
                    audioStream = null;
                    btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
                };
            }
            tempStream.getVideoTracks().forEach(t => t.stop());
        } catch (error) {
            updateStatus(`❌ فشل تشغيل الصوت: ${error.message}`, 'error');
        }
    });
    
    // ============== المشاهد (الضيف) ==============
    btnJoin.addEventListener('click', async () => {
        try {
            await cleanupConnection();
            isHost = false;
            roomId = roomCodeInput.value.trim();
            
            if (!roomId || roomId.length !== 4) {
                updateStatus("⚠️ الكود يجب أن يكون 4 أرقام", 'error');
                return;
            }
            
            updateStatus("🔍 جاري البحث عن الغرفة...", 'info');
            
            const roomSnapshot = await get(ref(db, `rooms/${roomId}`));
            
            if (!roomSnapshot.exists()) {
                updateStatus("❌ الغرفة غير موجودة. تأكد من الكود.", 'error');
                return;
            }
            
            const guestsData = roomSnapshot.val().guests || {};
            if (Object.keys(guestsData).length >= MAX_GUESTS) {
                updateStatus(`❌ الغرفة مكتملة (الحد الأقصى ${MAX_GUESTS})`, 'error');
                return;
            }
            
            switchScreen(welcomeScreen, roomScreen);
            displayRoomCode.innerText = roomId;
            remoteVideo.style.display = "block";
            // إلغاء كتم الصوت تلقائياً للتشغيل على الهواتف
            remoteVideo.muted = false;
            remoteVideo.playsInline = true;
            hostControlArea.classList.add('hidden');
            
            updateStatus("📡 جاري الاتصال بالبث عبر خوادم TURN (تدعم 4G)...", 'info');
            
            myGuestId = 'guest_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
            const myGuestRef = ref(db, `rooms/${roomId}/guests/${myGuestId}`);
            onDisconnect(myGuestRef).remove();
            
            await setupWebrtcAsGuest();
            
        } catch (error) {
            updateStatus(`❌ خطأ: ${error.message}`, 'error');
        }
    });
    
    // إعداد اتصال الضيف - نسخة محسنة بالكامل
    async function setupWebrtcAsGuest() {
        if (peerConnection) {
            try { peerConnection.close(); } catch (e) {}
            peerConnection = null;
        }
        
        pendingHostCandidates = [];
        
        const iceConfig = getIceServers();
        peerConnection = new RTCPeerConnection(iceConfig);
        
        // معالجة المسارات الواردة
        peerConnection.ontrack = async (event) => {
            console.log("📺 تم استلام مسار:", event.track.kind);
            if (event.streams && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                try {
                    // إلغاء الكتم للتشغيل التلقائي
                    remoteVideo.muted = false;
                    await remoteVideo.play();
                    updateStatus("✅ تم الاتصال ويتم تشغيل البث عبر بيانات الهاتف/الواي فاي", 'success');
                } catch (e) {
                    console.error("Play error:", e);
                    updateStatus("⚠️ تم استلام البث. اضغط على الفيديو لبدء التشغيل", 'warning');
                }
            }
        };
        
        // مراقبة حالة الاتصال
        peerConnection.onconnectionstatechange = () => {
            console.log(`Connection State: ${peerConnection.connectionState}`);
            if (peerConnection.connectionState === "connected") {
                reconnectAttempts = 0;
                updateStatus("✅ الاتصال ناجح عبر TURN", 'success');
            } else if (peerConnection.connectionState === "failed") {
                updateStatus("❌ فشل الاتصال بالبث", 'error');
                // محاولة إعادة الاتصال
                if (reconnectAttempts < 3) {
                    reconnectAttempts++;
                    updateStatus(`🔄 إعادة محاولة الاتصال (${reconnectAttempts}/3)...`, 'warning');
                    setTimeout(() => setupWebrtcAsGuest(), 2000);
                }
            }
        };
        
        // مراقبة حالة ICE
        peerConnection.oniceconnectionstatechange = async () => {
            console.log(`ICE State: ${peerConnection.iceConnectionState}`);
            if (peerConnection.iceConnectionState === "checking") {
                updateStatus("🔄 جاري إنشاء الاتصال عبر TURN...", 'info');
            } else if (
                peerConnection.iceConnectionState === "connected" ||
                peerConnection.iceConnectionState === "completed"
            ) {
                updateStatus("✅ تم الاتصال عبر TURN، مناسب لبيانات الهاتف", 'success');
            } else if (peerConnection.iceConnectionState === "failed") {
                updateStatus("⚠️ تعذر الاتصال عبر TURN", 'warning');
                try {
                    peerConnection.restartIce();
                } catch (e) {
                    console.error(e);
                }
            }
        };
        
        // إرسال مرشحات ICE الخاصة بالضيف
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                const candidateRef = ref(
                    db,
                    `rooms/${roomId}/guests/${myGuestId}/guestCandidates/${Date.now()}_${Math.random().toString(36).slice(2, 8)}`
                );
                set(candidateRef, event.candidate.toJSON());
            }
        };
        
        // تسجيل وقت الانضمام
        await set(ref(db, `rooms/${roomId}/guests/${myGuestId}/joinedAt`), Date.now());
        
        // الاستماع لعرض المضيف
        onValue(ref(db, `rooms/${roomId}/guests/${myGuestId}/offer`), async (snapshot) => {
            const offer = snapshot.val();
            if (!offer || !peerConnection) return;
            
            try {
                if (peerConnection.signalingState !== "stable") return;
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                
                // إضافة مرشحات المضيف المعلقة
                for (const c of pendingHostCandidates) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(c));
                }
                pendingHostCandidates = [];
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await update(ref(db, `rooms/${roomId}/guests/${myGuestId}`), {
                    answer: {
                        type: answer.type,
                        sdp: answer.sdp
                    }
                });
                updateStatus("✅ تم الرد على المضيف", 'success');
            } catch (error) {
                console.error("Error handling offer:", error);
                updateStatus(`❌ تعذر معالجة عرض المضيف: ${error.message}`, 'error');
            }
        });
        
        // الاستماع لمرشحات المضيف
        onChildAdded(ref(db, `rooms/${roomId}/guests/${myGuestId}/hostCandidates`), async (snapshot) => {
            if (!snapshot.exists()) return;
            const candidate = snapshot.val();
            try {
                if (peerConnection.remoteDescription) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } else {
                    pendingHostCandidates.push(candidate);
                }
            } catch (error) {
                console.error("Guest addIceCandidate failed:", error);
            }
        });
    }
    
    function switchScreen(hide, show) {
        hide.classList.remove('active');
        show.classList.add('active');
    }
    
    // التحقق من نوع الشبكة
    setInterval(checkNetworkType, 3000);
    checkNetworkType();
    
    console.log("✅ التطبيق جاهز - يستخدم خوادم TURN محسنة (يدعم 4G/5G/WiFi)");
    console.log(`📡 تكوين TURN - Username: ${TURN_CONFIG.username}`);
    
    // تنبيه حول بيانات TURN
    console.warn("⚠️ تأكد من استبدال بيانات TURN ببيانات صالحة من Xirsys أو Twilio للعمل على 4G/5G");
</script>
