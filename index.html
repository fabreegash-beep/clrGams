<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السينما والبث الحي المطور</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
          apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
          authDomain: "my-online-store-34f34.firebaseapp.com",
          databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "my-online-store-34f34",
          storageBucket: "my-online-store-34f34.firebasestorage.app",
          messagingSenderId: "288655549705",
          appId: "1:288655549705:web:06901ce4ac1a50eebe1fd8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 🛠️ حل مشكلة الشاشة السوداء: خوادم اتصال متعددة لضمان ربط الشبكات المختلفة
        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ]
        };

        let peerConnection;
        let localStream;
        let roomId;
        let isHost = false;

        const welcomeScreen = document.getElementById('welcome-screen');
        const roomScreen = document.getElementById('room-screen');
        const btnHost = document.getElementById('btn-host');
        const btnJoin = document.getElementById('btn-join');
        const roomCodeInput = document.getElementById('room-code-input');
        const displayRoomCode = document.getElementById('display-room-code');
        const remoteVideo = document.getElementById('remote-video');
        const statusText = document.getElementById('status-text');
        const hostControlArea = document.getElementById('host-control-area');
        const urlInput = document.getElementById('url-input');
        const btnSendUrl = document.getElementById('btn-send-url');
        const sharedFrame = document.getElementById('shared-frame');

        // 1. منطق المضيف (Host)
        btnHost.addEventListener('click', async () => {
            isHost = true;
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            displayRoomCode.innerText = roomId;
            
            switchScreen(welcomeScreen, roomScreen);
            hostControlArea.style.display = "block"; 
            remoteVideo.style.display = "none"; // المضيف يتصفح الإطار مباشرة ولا يحتاج للفيديو
            statusText.innerText = "تم فتح الروم. ضع رابط الموقع في الخانة بالأسفل واضغط (بدء البث) لتفعيله للضيوف.";

            await remove(ref(db, `rooms/${roomId}`));

            onValue(ref(db, `rooms/${roomId}`), async (snapshot) => {
                const data = snapshot.val();
                if (data && data.answer && peerConnection && !peerConnection.currentRemoteDescription) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
        });

        // تشغيل الرابط وبدء التقاط الشاشة وبثها فوراً
        btnSendUrl.addEventListener('click', async () => {
            let url = urlInput.value.trim();
            if (!url) return alert("الرجاء إدخال الرابط أولاً");
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            sharedFrame.src = url;
            sharedFrame.style.display = "block";
            statusText.innerText = "جاري تحميل الموقع وتحضير كاميرا البث للضيوف...";

            try {
                // التقاط تبويب المتصفح أو الشاشة لبثها
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: 30 }, 
                    audio: true 
                });
                
                setupWebrtcAsHost();
                
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                statusText.innerText = "البث المباشر شغال الآن! تحكم بالموقع بالأسفل والجميع يتابع حركاتك.";
                hostControlArea.style.display = "none"; 
            } catch (error) {
                alert("تنبيه للمضيف: يجب الموافقة على مشاركة تبويب المتصفح لكي لا يظهر شاشة سوداء عند الضيوف.");
            }
        });

        async function setupWebrtcAsHost() {
            peerConnection = new RTCPeerConnection(iceServers);
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    set(ref(db, `rooms/${roomId}/hostCandidates/${Date.now()}`), event.candidate.toJSON());
                }
            };
            const offerDescription = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offerDescription);
            await update(ref(db, `rooms/${roomId}`), {
                offer: { type: offerDescription.type, sdp: offerDescription.sdp }
            });
            onChildAdded(ref(db, `rooms/${roomId}/guestCandidates`), (snapshot) => {
                if (snapshot.exists()) peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val())).catch(()=>{});
            });
        }

        // 2. منطق الضيف (Guest)
        btnJoin.addEventListener('click', () => {
            isHost = false;
            roomId = roomCodeInput.value.trim();
            if (roomId.length !== 4) return alert("كود الغرفة غير صحيح");

            statusText.innerText = "جاري الاتصال بقناة البث الحي للمضيف...";
            
            onValue(ref(db, `rooms/${roomId}`), async (snapshot) => {
                const data = snapshot.val();
                if (!data || !data.offer) return;

                if (!peerConnection) {
                    switchScreen(welcomeScreen, roomScreen);
                    displayRoomCode.innerText = roomId;
                    sharedFrame.style.display = "none"; // الضيف لا يفتح الموقع بنفسه بل يستقبله كفيديو
                    remoteVideo.style.display = "block"; // إظهار شاشة الفيديو عند الضيف
                    await setupWebrtcAsGuest(data.offer);
                }
            });
        });

        async function setupWebrtcAsGuest(offer) {
            peerConnection = new RTCPeerConnection(iceServers);
            
            // 🛠️ حل مشكلة الشاشة السوداء: تفعيل استقبال البث وتشغيله تلقائياً وتجاوز حظر المتصفحات
            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    remoteVideo.load();
                    remoteVideo.play()
                    .then(() => {
                        statusText.innerText = "البث المباشر يعمل الآن بنجاح! شاهد تحركات المضيف ثانية بثانية.";
                    })
                    .catch(() => {
                        statusText.innerText = "انقر فوق صندوق العرض بالأسفل لتفعيل وتنشيط الصوت والصورة فوراً.";
                    });
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    set(ref(db, `rooms/${roomId}/guestCandidates/${Date.now()}`), event.candidate.toJSON());
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answerDescription = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answerDescription);
            await update(ref(db, `rooms/${roomId}`), {
                answer: { type: answerDescription.type, sdp: answerDescription.sdp }
            });
            onChildAdded(ref(db, `rooms/${roomId}/hostCandidates`), (snapshot) => {
                if (snapshot.exists()) peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val())).catch(()=>{});
            });
        }

        function switchScreen(hide, show) {
            hide.classList.remove('active');
            show.classList.add('active');
        }

        // حل احتياطي: الضغط على أي مكان في الجسم يفعل تشغيل مشغلات الفيديو المقفلة تلقائياً
        document.body.addEventListener('click', () => {
            if (remoteVideo.srcObject && remoteVideo.paused) {
                remoteVideo.play().catch(()=>{});
            }
        });
    </script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #060913, #131a35, #060913);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #00f2fe;
            --text-color: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-color); padding: 15px; }
        .container { width: 100%; max-width: 800px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); border: none; color: white; padding: 14px 24px; font-size: 1rem; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2); }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--glass-border); }
        .divider { margin: 20px 0; color: #7f8c8d; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; color: white; font-size: 1rem; text-align: center; outline: none; }
        .status { font-size: 0.85rem; color: #cbd5e1; margin: 15px 0; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.2); line-height: 1.4; }
        .control-box { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 16px; margin-bottom: 15px; display: none; border: 1px solid rgba(0, 242, 254, 0.15); }
        
        /* مربع السينما والعرض */
        #view-container { width: 100%; margin-top: 20px; border-radius: 16px; overflow: hidden; background: #000000; aspect-ratio: 16/10; border: 1px solid var(--glass-border); position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; background: #ffffff; display: none; }
        
        /* 🛠️ تعديل وسم فيديو الضيف ليكون متجاوباً بالكامل ومفعلاً للتحكم بالصوت */
        video { width: 100%; height: 100%; object-fit: contain; background: #000000; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="welcome-screen" class="screen active">
            <h1>غرفة البث المباشر والسينما الجماعية</h1>
            <button id="btn-host" class="btn">فتح غرفة بث جديدة (المضيف)</button>
            <div class="divider">أو انضم إلى صديقك للمشاهدة</div>
            <input type="number" id="room-code-input" placeholder="أدخل كود الغرفة (4 أرقام)">
            <button id="btn-join" class="btn btn-secondary">دخول لمشاهدة البث</button>
        </div>

        <div id="room-screen" class="screen">
            <h1>رقم الغرفة الحالي: <span id="display-room-code" style="color:var(--accent-color); letter-spacing: 2px;">----</span></h1>
            
            <div id="status-text" class="status">جاري تهيئة قنوات المزامنة...</div>

            <div id="host-control-area" class="control-box">
                <input type="text" id="url-input" placeholder="ألصق رابط الموقع هنا للتصفح والبث المباشر" style="direction: ltr;">
                <button id="btn-send-url" class="btn" style="margin-top: 10px; padding: 10px;">بدء بث الموقع</button>
            </div>

            <div id="view-container">
                <iframe id="shared-frame" allow="autoplay; encrypted-media; fullscreen"></iframe>
                
                <video id="remote-video" autoplay playsinline muted controls></video>
            </div>
        </div>
    </div>

</body>
</html>
