// ===== المتغيرات العامة =====
let peerConnection;        // اتصال WebRTC للبث

// عناصر DOM
const welcomeScreen = document.getElementById('welcome-screen');

const chatInput = document.getElementById('chat-input');

let participants = {};

function updateStatus(message, isError = false) {
  statusText.innerHTML = message;
  statusText.style.color = isError ? '#ff6b6b' : '#cbd5e1';
  console.log(`[Status] ${message}`);
}

function updateParticipantsCount() {
  const count = Object.keys(participants).length;
  participantsCount.innerText = count;
}

function addChatMessage(name, message, isSystem = false) {
  const div = document.createElement('div');
  div.className = 'chat-line' + (isSystem ? ' chat-system' : '');
  if (isSystem) {
    div.innerHTML = `🔔 ${message}`;
  } else {
    div.innerHTML = `<span class="chat-name">${escapeHtml(name)}:</span> ${escapeHtml(message)}`;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.innerText = str;
  return div.innerHTML;
}

function createParticipantVideo(participantId, stream, name) {
  let container = document.getElementById(`participant-${participantId}`);
  if (!container) {
    container = document.createElement('div');
    container.id = `participant-${participantId}`;
    container.className = 'participant-video';

    const video = document.createElement('video');
    video.id = `video-${participantId}`;
    video.autoplay = true;
    video.playsInline = true;
    video.srcObject = stream;

    const nameLabel = document.createElement('div');
    nameLabel.className = 'participant-label';
    nameLabel.innerText = name || 'مشارك';

    container.appendChild(video);
    container.appendChild(nameLabel);
    participantsGrid.appendChild(container);
  }
  updateParticipantsCount();
}

function removeParticipantVideo(participantId) {
  const container = document.getElementById(`participant-${participantId}`);
  if (container) container.remove();
  delete participants[participantId];
  updateParticipantsCount();
}

// إضافة مسار إلى اتصال البث
async function addTrackToConnection(track, stream) {
  if (peerConnection && track) {
    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === track.kind);
    if (sender) {
      await sender.replaceTrack(track);
      updateStatus(`✅ تم تحديث مسار ${track.kind === 'audio' ? 'الصوت' : 'الفيديو'}`);
    } else {
      peerConnection.addTrack(track, stream);
      updateStatus(`✅ تم إضافة مسار ${track.kind === 'audio' ? 'الصوت' : 'الفيديو'}`);
    }
  }
}

// تنظيف الاتصال
async function cleanupConnection() {
  if (videoStream) {
    videoStream.getTracks().forEach(track => track.stop());
    videoStream = null;
  }
  if (audioStream) {
    audioStream.getTracks().forEach(track => track.stop());
    audioStream = null;
  }
  if (localChatStream) {
    localChatStream.getTracks().forEach(track => track.stop());
    localChatStream = null;
  }
  
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
  
  Object.values(chatPeerConnections).forEach(pc => pc.close());
  chatPeerConnections = {};
  
  isScreenSharing = false;
  isAudioSharing = false;
  isMicOn = false;
  isCameraOn = false;
  
  participantsGrid.innerHTML = '';
  participants = {};
  
  if (roomId && userId) {
    const userRef = ref(db, `rooms/${roomId}/users/${userId}`);
    await remove(userRef).catch(() => {});
  }
}

// ==================== إنشاء اتصال دردشة مع مشارك ====================
async function createChatConnection(otherId, userName) {
  if (chatPeerConnections[otherId]) return;
  
  const pc = new RTCPeerConnection(iceServers);
  chatPeerConnections[otherId] = pc;
  
  // إضافة مسارات الميكروفون والكاميرا
  if (localChatStream) {
    localChatStream.getTracks().forEach(track => {
      pc.addTrack(track, localChatStream);
    });
  }
  
  pc.ontrack = (event) => {
    if (event.track.kind === 'video') {
      createParticipantVideo(otherId, event.streams[0], userName);
    }
  };
  
  pc.onicecandidate = (event) => {
    if (event.candidate) {
      push(ref(db, `rooms/${roomId}/chatSignals/${otherId}/${userId}/candidates`), event.candidate.toJSON());
    }
  };
  
  // الاستماع للعروض
  const offerRef = ref(db, `rooms/${roomId}/chatSignals/${userId}/${otherId}/offer`);
  onValue(offerRef, async (snapshot) => {
    const offer = snapshot.val();
    if (offer && pc.signalingState === 'stable') {
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await set(ref(db, `rooms/${roomId}/chatSignals/${otherId}/${userId}/answer`), { type: answer.type, sdp: answer.sdp });
    }
  });
  
  // الاستماع للإجابات
  const answerRef = ref(db, `rooms/${roomId}/chatSignals/${userId}/${otherId}/answer`);
  onValue(answerRef, async (snapshot) => {
    const answer = snapshot.val();
    if (answer && pc.signalingState === 'have-local-offer') {
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
    }
  });
  
  // الاستماع للمرشحات
  const candidatesRef = ref(db, `rooms/${roomId}/chatSignals/${userId}/${otherId}/candidates`);
  onChildAdded(candidatesRef, (snapshot) => {
    const candidate = snapshot.val();
    if (candidate && pc.remoteDescription) {
      pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(console.error);
    }
  });
  
  // بدء المفاوضة
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await set(ref(db, `rooms/${roomId}/chatSignals/${otherId}/${userId}/offer`), { type: offer.type, sdp: offer.sdp });
}

// ==================== المضيف ====================
btnHost.addEventListener('click', () => {
  switchScreen(welcomeScreen, nameScreen);
  isHost = true;
});

btnJoin.addEventListener('click', () => {

// ==================== تعيين الاسم والدخول ====================
btnSetName.addEventListener('click', async () => {
  const userName = userNameInput.value.trim();
  if (!userName) {
    alert("الرجاء إدخال اسمك");
    return;
  }
  
  currentUser = { name: userName };
  userId = (isHost ? 'host' : 'guest') + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
  
  if (isHost) {
    // مضيف - ينشئ غرفة جديدة
    roomId = Math.floor(1000 + Math.random() * 9000).toString();
    displayRoomCode.innerText = roomId;
    
    switchScreen(nameScreen, roomScreen);
    hostControlArea.style.display = "block";
    remoteVideo.style.display = "none";
    sharedFrame.style.display = "none";
    cinemaVideo.style.display = "none";
    updateStatus(`✅ مرحباً ${userName}! تم فتح الغرفة. شارك الكود: ${roomId}`);
    
    // إنشاء الغرفة في Firebase
    const roomRef = ref(db, `rooms/${roomId}`);
    await set(roomRef, { createdAt: Date.now(), host: userId, hostName: userName });
    onDisconnect(roomRef).remove();
    
    // تسجيل المضيف
    const userRef = ref(db, `rooms/${roomId}/users/${userId}`);
    await set(userRef, { name: userName, isHost: true, joinedAt: Date.now() });
    onDisconnect(userRef).remove();
    
    // بدء الاستماع للمستخدمين الجدد
    listenForUsers();
    listenForChat();
  } else {
    // ضيف - يدخل غرفة موجودة
    roomId = roomCodeInput.value.trim();
    if (!roomId || roomId.length !== 4) {
      alert("كود الغرفة يجب أن يكون 4 أرقام");
      return;
    }
    
    updateStatus(`🔍 جاري البحث عن الغرفة ${roomId}...`);
    
    // التحقق من وجود الغرفة
    const roomRef = ref(db, `rooms/${roomId}`);
    const snapshot = await new Promise((resolve) => {
      onValue(roomRef, resolve, { onlyOnce: true });
    });
    
    if (!snapshot.exists()) {
      updateStatus("❌ الغرفة غير موجودة. تأكد من الكود.", true);
      return;
    }
    
    switchScreen(nameScreen, roomScreen);
    hostControlArea.style.display = "none";
    remoteVideo.style.display = "block";
    sharedFrame.style.display = "none";
    cinemaVideo.style.display = "none";
    updateStatus(`📡 مرحباً ${userName}! جاري الاتصال بالغرفة...`);
    
    // تسجيل الضيف
    const userRef = ref(db, `rooms/${roomId}/users/${userId}`);
    await set(userRef, { name: userName, isHost: false, joinedAt: Date.now() });
    onDisconnect(userRef).remove();
    
    // بدء الاستماع للمستخدمين والبث
    listenForUsers();
    listenForBroadcast();
    listenForChat();
  }
});

// ==================== الاستماع للمستخدمين ====================
function listenForUsers() {
  const usersRef = ref(db, `rooms/${roomId}/users`);
  
  onChildAdded(usersRef, (snapshot) => {
    const otherId = snapshot.key;
    const userData = snapshot.val();
    
    if (otherId !== userId && !participants[otherId]) {
      participants[otherId] = userData;
      updateParticipantsCount();
      addChatMessage('النظام', `انضم ${userData.name} إلى الغرفة`, true);
      
      // إذا كان هناك بث شاشة نشط، أضف المستخدم الجديد إليه
      if (isHost && (isScreenSharing || isAudioSharing)) {
        addNewUserToBroadcast(otherId);
      }
      
      // إنشاء اتصال دردشة مع المستخدم الجديد
      if (localChatStream) {
        createChatConnection(otherId, userData.name);
      }
    }
  });
  
  onChildRemoved(usersRef, (snapshot) => {
    const otherId = snapshot.key;
    const userData = snapshot.val();
    if (otherId !== userId) {
      removeParticipantVideo(otherId);
      if (chatPeerConnections[otherId]) {
        chatPeerConnections[otherId].close();
        delete chatPeerConnections[otherId];
      }
      addChatMessage('النظام', `غادر ${userData?.name || 'مشارك'} الغرفة`, true);
    }
  });
}

// إضافة مستخدم جديد إلى البث الحالي
async function addNewUserToBroadcast(otherId) {
  if (!peerConnection) {
    await setupWebrtcAsHost();
  }
  
  // إضافة مسارات الشاشة والصوت للمستخدم الجديد
  if (videoStream && isScreenSharing) {
    const videoTrack = videoStream.getVideoTracks()[0];
    peerConnection.addTrack(videoTrack, videoStream);
  }
  if (audioStream && isAudioSharing) {
    const audioTrack = audioStream.getAudioTracks()[0];
    peerConnection.addTrack(audioTrack, audioStream);
  }
  
  // إعادة التفاوض
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  await update(ref(db, `rooms/${roomId}`), {
    offer: { type: offer.type, sdp: offer.sdp }
  });
}

// ==================== بث الشاشة ====================
btnShareScreen.addEventListener('click', async () => {
  if (isScreenSharing) {
    if (videoStream) {
      videoStream.getTracks().forEach(track => track.stop());
      videoStream = null;
    }
    isScreenSharing = false;
    btnShareScreen.textContent = "🖥️ مشاركة الشاشة";
    remoteVideo.style.display = "none";
    updateStatus("تم إيقاف مشاركة الشاشة");
    return;
  }
  
  updateStatus("🖥️ جاري مشاركة الشاشة...");
  
  try {
    videoStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 30 }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    
    isScreenSharing = true;
    updateStatus("✅ تم مشاركة الشاشة بنجاح!");
    
    if (!peerConnection) {
      await setupWebrtcAsHost();
    }
    
    const videoTrack = videoStream.getVideoTracks()[0];
    await addTrackToConnection(videoTrack, videoStream);
    
    remoteVideo.srcObject = videoStream;
    remoteVideo.style.display = "block";
    btnShareScreen.textContent = "⏹️ إيقاف المشاركة";
    updateStatus("🎬 بث الشاشة يعمل الآن!");
    
    videoTrack.onended = () => {
      isScreenSharing = false;
      btnShareScreen.textContent = "🖥️ مشاركة الشاشة";
      remoteVideo.style.display = "none";
      updateStatus("⚠️ توقفت مشاركة الشاشة", true);
    };
    
  } catch (error) {
    updateStatus(`❌ فشل مشاركة الشاشة: ${error.message}`, true);
  }
});

// ==================== صوت الجهاز ====================
btnShareAudio.addEventListener('click', async () => {
  if (isAudioSharing) {
    if (audioStream) {
      audioStream.getTracks().forEach(track => track.stop());
      audioStream = null;
    }
    isAudioSharing = false;
    btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
    updateStatus("🔇 تم إيقاف بث صوت الجهاز");
    return;
  }
  
  updateStatus("🎵 جاري تشغيل صوت الجهاز...");
  
  try {
    const tempStream = await navigator.mediaDevices.getDisplayMedia({
      video: { width: 1, height: 1 },
      audio: true
    });
    
    const audioTrack = tempStream.getAudioTracks()[0];
    if (audioTrack) {
      audioStream = new MediaStream();
      audioStream.addTrack(audioTrack);
      isAudioSharing = true;
      
      if (!peerConnection) {
        await setupWebrtcAsHost();
      }
      
      await addTrackToConnection(audioTrack, audioStream);
      
      updateStatus("🎵 تم تشغيل صوت الجهاز!");
      btnShareAudio.textContent = "🔇 إيقاف صوت الجهاز";
      
      audioTrack.onended = () => {
        isAudioSharing = false;
        btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
      };
      
      tempStream.getVideoTracks().forEach(track => track.stop());
    }
  } catch (error) {
    updateStatus(`❌ فشل تشغيل الصوت: ${error.message}`, true);
  }
});

// ==================== رابط الموقع ====================
btnSendUrl.addEventListener('click', () => {
  let url = urlInput.value.trim();
  if (!url) {
    updateStatus("⚠️ الرجاء إدخال الرابط", true);
    return;
  }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  sharedFrame.src = url;
  sharedFrame.style.display = "block";
  remoteVideo.style.display = "none";
  updateStatus("📺 تم تحميل الموقع");
});

// ==================== إعداد اتصال WebRTC للمضيف ====================
async function setupWebrtcAsHost() {
  peerConnection = new RTCPeerConnection(iceServers);
  
  peerConnection.onconnectionstatechange = () => {
    if (peerConnection.connectionState === 'connected') {
      updateStatus("✅ البث متصل بنجاح!");
    } else if (peerConnection.connectionState === 'failed') {
      updateStatus("❌ فشل الاتصال", true);
    }
  };
  
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      const candidateRef = ref(db, `rooms/${roomId}/hostCandidates/${Date.now()}`);
      set(candidateRef, event.candidate.toJSON());
    }
  };
  
  peerConnection.onnegotiationneeded = async () => {
    try {
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await update(ref(db, `rooms/${roomId}`), {
        offer: { type: offer.type, sdp: offer.sdp }
      });
    } catch (error) {
      console.error("Negotiation error:", error);
    }
  };
  
  // الاستماع لإجابات الضيف
  onValue(ref(db, `rooms/${roomId}/answer`), (snapshot) => {
    const answer = snapshot.val();
    if (answer && peerConnection && peerConnection.signalingState === 'have-local-offer') {
      peerConnection.setRemoteDescription(new RTCSessionDescription(answer))
        .then(() => updateStatus("✅ تم استلام رد الضيف"))
        .catch(console.error);
    }
  });
  
  // الاستماع لمرشحات الضيف
  onChildAdded(ref(db, `rooms/${roomId}/guestCandidates`), (snapshot) => {
    if (snapshot.exists() && peerConnection) {
      peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val()))
        .catch(console.error);
    }
  });
}

// ==================== إعداد اتصال WebRTC للضيف ====================
async function setupWebrtcAsGuest() {
  peerConnection = new RTCPeerConnection(iceServers);
  
  peerConnection.ontrack = (event) => {
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
      remoteVideo.play().then(() => {
        const hasAudio = remoteVideo.srcObject.getAudioTracks().length > 0;
        updateStatus(`🎬 تم الاتصال!${hasAudio ? ' يتم سماع صوت الجهاز.' : ''}`);
      }).catch(() => {
        updateStatus("⚠️ انقر على الفيديو لبدء التشغيل", true);
      });
    }
  };
  
  peerConnection.onconnectionstatechange = () => {
    if (peerConnection.connectionState === 'connected') {
      updateStatus("✅ تم الاتصال بالبث بنجاح!");
    } else if (peerConnection.connectionState === 'failed') {
      updateStatus("❌ فشل الاتصال", true);
    }
  };
  
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      const candidateRef = ref(db, `rooms/${roomId}/guestCandidates/${Date.now()}`);
      set(candidateRef, event.candidate.toJSON());
    }
  };
  
  // الاستماع لعرض المضيف
  onValue(ref(db, `rooms/${roomId}/offer`), async (snapshot) => {
    const offer = snapshot.val();
    if (offer && peerConnection && peerConnection.signalingState === 'stable') {
      try {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        await update(ref(db, `rooms/${roomId}`), {
          answer: { type: answer.type, sdp: answer.sdp }
        });
        updateStatus("✅ تم إرسال الرد إلى المضيف");
      } catch (error) {
        console.error("Error:", error);
      }
    }
  });
  
  // الاستماع لمرشحات المضيف
  onChildAdded(ref(db, `rooms/${roomId}/hostCandidates`), (snapshot) => {
    if (snapshot.exists() && peerConnection) {
      peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val()))
        .catch(console.error);
    }
  });
  
  const offerSnapshot = await new Promise((resolve) => {
    onValue(ref(db, `rooms/${roomId}/offer`), resolve, { onlyOnce: true });
  });
  
  if (offerSnapshot.exists() && peerConnection.signalingState === 'stable') {
    const offer = offerSnapshot.val();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await update(ref(db, `rooms/${roomId}`), {
      answer: { type: answer.type, sdp: answer.sdp }
    });
  }
}

// ==================== استلام البث للضيوف ====================
function listenForBroadcast() {
  const broadcastRef = ref(db, `rooms/${roomId}`);
  onValue(broadcastRef, (snapshot) => {
    const data = snapshot.val();
    if (data && data.offer && !isHost && !peerConnection) {
      setupWebrtcAsGuest();
    }
  });
}

// ==================== الدردشة النصية ====================
function listenForChat() {
  onChildAdded(ref(db, `rooms/${roomId}/chat`), (snapshot) => {
    const msg = snapshot.val();
    if (msg && msg.senderId !== userId) {
      addChatMessage(msg.name, msg.message);
    }
  });
}

btnSendChat.addEventListener('click', () => {
  const message = chatInput.value.trim();
  if (!message) return;
  
  push(ref(db, `rooms/${roomId}/chat`), {
    name: currentUser.name,
    message: message,
    senderId: userId,
    timestamp: Date.now()
  });
  addChatMessage(currentUser.name, message);
  chatInput.value = '';
});

chatInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') btnSendChat.click();
});

// ==================== الميكروفون والكاميرا ====================
btnToggleMic.addEventListener('click', async () => {
  if (isMicOn) {
    if (localChatStream) {
      localChatStream.getAudioTracks().forEach(t => t.stop());
    }
    isMicOn = false;
    btnToggleMic.classList.remove('active');
    updateStatus("تم إيقاف الميكروفون");
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      if (!localChatStream) localChatStream = new MediaStream();
      stream.getAudioTracks().forEach(t => localChatStream.addTrack(t));
      localVideo.srcObject = localChatStream;
      
      // إضافة الصوت لجميع اتصالات الدردشة
      for (const [otherId, pc] of Object.entries(chatPeerConnections)) {
        stream.getAudioTracks().forEach(t => pc.addTrack(t, localChatStream));
      }
      
      isMicOn = true;
      btnToggleMic.classList.add('active');
      updateStatus("الميكروفون يعمل");
    } catch (error) {
      updateStatus(`فشل تشغيل الميكروفون: ${error.message}`, true);
    }
  }
});

btnToggleCamera.addEventListener('click', async () => {
  if (isCameraOn) {
    if (localChatStream) {
      localChatStream.getVideoTracks().forEach(t => t.stop());
    }
    isCameraOn = false;
    btnToggleCamera.classList.remove('active');
    localVideo.style.display = 'none';
    updateStatus("تم إيقاف الكاميرا");
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      if (!localChatStream) localChatStream = new MediaStream();
      stream.getVideoTracks().forEach(t => localChatStream.addTrack(t));
      localVideo.srcObject = localChatStream;
      localVideo.style.display = 'block';
      
      for (const [otherId, pc] of Object.entries(chatPeerConnections)) {
        stream.getVideoTracks().forEach(t => pc.addTrack(t, localChatStream));
      }
      
      isCameraOn = true;
      btnToggleCamera.classList.add('active');
      updateStatus("الكاميرا تعمل");
    } catch (error) {
      updateStatus(`فشل تشغيل الكاميرا: ${error.message}`, true);
    }
  }
});

btnToggleSpeaker.addEventListener('click', () => {
  const isMuted = !btnToggleSpeaker.classList.contains('active');
  remoteVideo.muted = isMuted;
  document.querySelectorAll('.participant-video video').forEach(v => v.muted = isMuted);
  if (isMuted) {
    btnToggleSpeaker.classList.add('active');
    btnToggleSpeaker.innerHTML = '🔊';
    updateStatus("السماعة مفعلة");
  } else {
    btnToggleSpeaker.classList.remove('active');
    btnToggleSpeaker.innerHTML = '🔇';
    updateStatus("السماعة معطلة");
  }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    cinemaContainer.requestFullscreen();
    btnToggleFullscreen.textContent = "🗗 تصغير";
  } else {
    document.exitFullscreen();
    btnToggleFullscreen.textContent = "🗖 تكبير";
  }
}

btnToggleFullscreen.addEventListener('click', toggleFullscreen);

function switchScreen(hide, show) {
  hide.classList.remove('active');
  show.classList.add('active');
}

document.body.addEventListener('click', () => {
  if (remoteVideo.srcObject && remoteVideo.paused) {
    remoteVideo.play().catch(() => {});
  }
});

window.addEventListener('beforeunload', () => cleanupConnection());

console.log("✅ التطبيق جاهز - بث منفصل + دردشة صوتية وفيديو جماعية");
</script>
