<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>سينما لايف - بث مباشر | يدعم 4G مع Xirsys</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
    }
    .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 28px;
        width: 100%;
        max-width: 950px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .screen { display: none; padding: 24px; }
    .screen.active { display: block; }
    h1 { font-size: 24px; margin-bottom: 20px; text-align: center; color: white; }
    .btn {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
        color: white;
        transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-secondary { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); }
    .btn-success { background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%); }
    .btn-warning { background: linear-gradient(90deg, #fa709a 0%, #fee140 100%); color: #333; }
    input {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 14px;
        font-size: 18px;
        text-align: center;
        background: rgba(0,0,0,0.3);
        color: white;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    .status {
        background: rgba(0,0,0,0.5);
        padding: 12px;
        border-radius: 12px;
        margin: 16px 0;
        text-align: center;
        color: white;
        font-size: 14px;
    }
    .status.error { background: rgba(255,0,0,0.3); color: #ff9999; }
    .status.success { background: rgba(0,255,0,0.2); color: #99ff99; }
    .control-box {
        background: rgba(0,0,0,0.3);
        padding: 20px;
        border-radius: 20px;
        margin: 20px 0;
    }
    .buttons-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 15px;
    }
    .viewer-container {
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        aspect-ratio: 16/9;
        margin-top: 20px;
    }
    video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
    }
    @media (max-width: 600px) {
        .screen { padding: 16px; }
        h1 { font-size: 20px; }
        .buttons-group { grid-template-columns: 1fr; }
    }
    .room-code {
        font-size: 32px;
        letter-spacing: 8px;
        text-align: center;
        color: #00f2fe;
        margin: 10px 0;
    }
    .info-text {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
        margin-top: 12px;
        text-align: center;
    }
    .warning {
        background: rgba(255,193,7,0.2);
        border: 1px solid #ffc107;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 15px;
        font-size: 13px;
        text-align: center;
        color: #ffc107;
    }
    .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
    <div id="welcome-screen" class="screen active">
        <h1>🎬 سينما لايف - بث مباشر</h1>
        <div class="warning">
            📱 يدعم جميع الشبكات (4G/5G/WiFi) - بث عالي الجودة
        </div>
        <button id="btn-host" class="btn">🚀 إنشاء غرفة بث (مضيف)</button>
        <div style="text-align: center; margin: 15px 0; color: rgba(255,255,255,0.5);">أو</div>
        <input type="text" id="room-code-input" placeholder="📱 كود الغرفة (4 أرقام)" maxlength="4" inputmode="numeric">
        <button id="btn-join" class="btn btn-secondary">👥 مشاهدة البث (مشاهد)</button>
    </div>

    <div id="room-screen" class="screen">
        <h1>🏠 غرفة البث</h1>
        <div class="room-code" id="display-room-code">----</div>
        <div id="status-text" class="status">⚙️ جاري التهيئة...</div>

        <div id="host-control-area" style="display: none;">
            <div class="control-box">
                <button id="btn-share-screen" class="btn btn-success">🖥️ بدء بث الشاشة</button>
                <button id="btn-stop-share" class="btn btn-warning hidden">⏹️ إيقاف البث</button>
                <div class="info-text">
                    💡 اضغط "بدء بث الشاشة" واختر الشاشة أو النافذة<br>
                    🎤 سيتم بث الصوت تلقائياً مع الشاشة
                </div>
            </div>
        </div>

        <div class="viewer-container">
            <video id="remote-video" autoplay playsinline controls></video>
        </div>
        
        <div id="guest-info" style="text-align: center; margin-top: 15px; color: rgba(255,255,255,0.5); font-size: 13px;">
            📡 في انتظار بدء البث...
        </div>
    </div>
</div>

<script type="module">
// ==============================================
// 🔥 بيانات Xirsys الخاصة بك - مدمجة في الكود
// ==============================================
const XIRSYS_USERNAME = "anis";
const XIRSYS_CREDENTIAL = "e106fc76-672c-11f1-8b93-0242ac130002";
const XIRSYS_CHANNEL = "MyFirstApp";

// استيراد Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, remove, push, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

// إعدادات Firebase
const firebaseConfig = {
    apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
    authDomain: "my-online-store-34f34.firebaseapp.com",
    databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "my-online-store-34f34",
    storageBucket: "my-online-store-34f34.firebasestorage.app",
    messagingSenderId: "288655549705",
    appId: "1:288655549705:web:06901ce4ac1a50eebe1fd8"
};

// تهيئة Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
console.log("✅ Firebase initialized");

// ==============================================
// 🚀 خوادم TURN المحسنة مع Xirsys
// ==============================================
const getIceServers = () => ({
    iceServers: [
        // خوادم STUN للمساعدة
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' },
        { urls: 'stun:stun.xirsys.com' },
        
        // ⭐ خوادم Xirsys TURN - الحل الرئيسي لشبكات 4G
        {
            username: XIRSYS_USERNAME,
            credential: XIRSYS_CREDENTIAL,
            urls: [
                `turn:turn.xirsys.com:80?transport=udp`,
                `turn:turn.xirsys.com:3478?transport=udp`,
                `turn:turn.xirsys.com:80?transport=tcp`,
                `turn:turn.xirsys.com:3478?transport=tcp`,
                `turns:turn.xirsys.com:443?transport=tcp`,
                `turns:turn.xirsys.com:5349?transport=tcp`
            ]
        },
        
        // خوادم احتياطية مجانية
        {
            urls: 'turn:openrelay.metered.ca:80',
            username: 'openrelayproject',
            credential: 'openrelayproject'
        }
    ],
    iceTransportPolicy: 'all',
    iceCandidatePoolSize: 10
});

// المتغيرات العامة
let localStream = null;
let peerConnection = null;
let roomId = null;
let isHost = false;
let isSharing = false;

// عناصر DOM
const welcomeScreen = document.getElementById('welcome-screen');
const roomScreen = document.getElementById('room-screen');
const btnHost = document.getElementById('btn-host');
const btnJoin = document.getElementById('btn-join');
const roomCodeInput = document.getElementById('room-code-input');
const displayRoomCode = document.getElementById('display-room-code');
const remoteVideo = document.getElementById('remote-video');
const statusText = document.getElementById('status-text');
const hostControlArea = document.getElementById('host-control-area');
const btnShareScreen = document.getElementById('btn-share-screen');
const btnStopShare = document.getElementById('btn-stop-share');
const guestInfo = document.getElementById('guest-info');

function updateStatus(message, isError = false) {
    statusText.innerHTML = message;
    statusText.className = `status ${isError ? 'error' : 'success'}`;
    console.log(`[${isError ? 'ERROR' : 'INFO'}] ${message}`);
}

function switchScreen(hide, show) {
    hide.classList.remove('active');
    show.classList.add('active');
}

// إغلاق الاتصال القديم
async function closeConnection() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
}

// ============== المضيف ==============
btnHost.addEventListener('click', async () => {
    try {
        console.log("بدء إنشاء الغرفة...");
        updateStatus("🚀 جاري إنشاء الغرفة...");
        
        await closeConnection();
        isHost = true;
        roomId = Math.floor(1000 + Math.random() * 9000).toString();
        displayRoomCode.innerText = roomId;
        
        switchScreen(welcomeScreen, roomScreen);
        hostControlArea.style.display = "block";
        remoteVideo.style.display = "block";
        guestInfo.style.display = "block";
        remoteVideo.srcObject = null;
        
        updateStatus(`✅ تم إنشاء الغرفة رقم ${roomId}. شارك الكود مع أصدقائك!`);
        
        // حفظ حالة الغرفة في Firebase
        const roomRef = ref(db, `rooms/${roomId}`);
        await set(roomRef, {
            hostId: 'host',
            createdAt: Date.now(),
            active: true
        });
        console.log("✅ تم حفظ الغرفة في Firebase");
        
        // حذف الغرفة عند إغلاق المتصفح
        onDisconnect(roomRef).remove();
        
        // الاستماع لطلبات المشاهدين
        const viewerOfferRef = ref(db, `rooms/${roomId}/viewerOffer`);
        onValue(viewerOfferRef, async (snapshot) => {
            const offer = snapshot.val();
            if (offer && !peerConnection) {
                console.log("تم استلام طلب من مشاهد");
                await startHostConnection(offer);
            }
        });
        
    } catch (error) {
        console.error("خطأ في إنشاء الغرفة:", error);
        updateStatus(`❌ خطأ: ${error.message}`, true);
    }
});

async function startHostConnection(viewerOffer) {
    try {
        if (peerConnection) {
            peerConnection.close();
        }
        
        peerConnection = new RTCPeerConnection(getIceServers());
        
        // إضافة مسار الفيديو إذا كان موجوداً
        if (localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                const candidateRef = ref(db, `rooms/${roomId}/hostCandidate`);
                set(candidateRef, event.candidate.toJSON());
            }
        };
        
        peerConnection.oniceconnectionstatechange = () => {
            console.log("ICE状態:", peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === 'connected') {
                updateStatus("✅ تم اتصال المشاهد!");
            } else if (peerConnection.iceConnectionState === 'failed') {
                updateStatus("⚠️ فشل الاتصال بالمشاهد", true);
            }
        };
        
        // قبول عرض المشاهد
        await peerConnection.setRemoteDescription(new RTCSessionDescription(viewerOffer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        
        // إرسال الرد للمشاهد
        await set(ref(db, `rooms/${roomId}/hostAnswer`), {
            type: answer.type,
            sdp: answer.sdp
        });
        
        console.log("✅ تم إرسال الرد للمشاهد");
        
    } catch (error) {
        console.error("خطأ في الاتصال:", error);
        updateStatus(`❌ خطأ في الاتصال: ${error.message}`, true);
    }
}

// بدء مشاركة الشاشة
btnShareScreen.addEventListener('click', async () => {
    try {
        updateStatus("🖥️ جاري بدء بث الشاشة...");
        
        localStream = await navigator.mediaDevices.getDisplayMedia({
            video: { frameRate: 30, width: 1280, height: 720 },
            audio: true
        });
        
        isSharing = true;
        btnShareScreen.classList.add('hidden');
        btnStopShare.classList.remove('hidden');
        
        // إظهار معاينة للمضيف
        remoteVideo.srcObject = localStream;
        remoteVideo.play();
        
        updateStatus("🎬 جاري بث الشاشة! المشاهدون يرون شاشتك الآن.");
        
        // إذا كان هناك اتصال قائم، أضف المسارات
        if (peerConnection && peerConnection.remoteDescription) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }
        
        localStream.getVideoTracks()[0].onended = () => {
            stopSharing();
        };
        
    } catch (error) {
        console.error("خطأ في بدء البث:", error);
        updateStatus(`❌ فشل البث: ${error.message}`, true);
    }
});

function stopSharing() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }
    isSharing = false;
    btnShareScreen.classList.remove('hidden');
    btnStopShare.classList.add('hidden');
    remoteVideo.srcObject = null;
    updateStatus("⏹️ تم إيقاف بث الشاشة");
}

btnStopShare.addEventListener('click', stopSharing);

// ============== المشاهد ==============
btnJoin.addEventListener('click', async () => {
    try {
        const code = roomCodeInput.value.trim();
        if (!code || code.length !== 4) {
            updateStatus("⚠️ أدخل كود الغرفة الصحيح (4 أرقام)", true);
            return;
        }
        
        roomId = code;
        displayRoomCode.innerText = roomId;
        isHost = false;
        
        switchScreen(welcomeScreen, roomScreen);
        hostControlArea.style.display = "none";
        remoteVideo.style.display = "block";
        guestInfo.style.display = "block";
        
        updateStatus("📡 جاري الاتصال بالغرفة...");
        
        // التحقق من وجود الغرفة
        const roomRef = ref(db, `rooms/${roomId}`);
        const roomSnapshot = await get(roomRef);
        
        if (!roomSnapshot.exists()) {
            updateStatus("❌ الغرفة غير موجودة. تأكد من الكود.", true);
            return;
        }
        
        console.log("✅ تم العثور على الغرفة");
        await startViewerConnection();
        
    } catch (error) {
        console.error("خطأ في الانضمام:", error);
        updateStatus(`❌ خطأ: ${error.message}`, true);
    }
});

async function startViewerConnection() {
    try {
        if (peerConnection) {
            peerConnection.close();
        }
        
        peerConnection = new RTCPeerConnection(getIceServers());
        
        peerConnection.ontrack = (event) => {
            console.log("تم استلام مسار:", event.track.kind);
            if (event.streams && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                remoteVideo.play().catch(e => console.log(e));
                updateStatus("🎬 تتلقى البث المباشر الآن!");
                guestInfo.innerHTML = "🎬 يتم البث الآن!";
            }
        };
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                const candidateRef = ref(db, `rooms/${roomId}/viewerCandidate`);
                set(candidateRef, event.candidate.toJSON());
            }
        };
        
        peerConnection.oniceconnectionstatechange = () => {
            console.log("ICE状態:", peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === 'connected') {
                updateStatus("✅ تم الاتصال بالمضيف!");
            } else if (peerConnection.iceConnectionState === 'failed') {
                updateStatus("⚠️ فشل الاتصال، جاري إعادة المحاولة...");
                setTimeout(() => startViewerConnection(), 3000);
            }
        };
        
        // إنشاء عرض للمضيف
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        // إرسال العرض للمضيف
        await set(ref(db, `rooms/${roomId}/viewerOffer`), {
            type: offer.type,
            sdp: offer.sdp
        });
        console.log("✅ تم إرسال العرض للمضيف");
        
        // الاستماع لرد المضيف
        const hostAnswerRef = ref(db, `rooms/${roomId}/hostAnswer`);
        onValue(hostAnswerRef, async (snapshot) => {
            const answer = snapshot.val();
            if (answer && peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                console.log("✅ تم استلام الرد من المضيف");
            }
        });
        
        // الاستماع للمرشحات
        const hostCandidateRef = ref(db, `rooms/${roomId}/hostCandidate`);
        onValue(hostCandidateRef, (snapshot) => {
            const candidate = snapshot.val();
            if (candidate && peerConnection && peerConnection.remoteDescription) {
                peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(console.error);
            }
        });
        
    } catch (error) {
        console.error("خطأ في اتصال المشاهد:", error);
        updateStatus(`❌ فشل الاتصال: ${error.message}`, true);
    }
}

// تنظيف عند الإغلاق
window.addEventListener('beforeunload', async () => {
    if (roomId && isHost) {
        try {
            await remove(ref(db, `rooms/${roomId}`));
        } catch(e) {}
    }
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    if (peerConnection) {
        peerConnection.close();
    }
});

console.log("✅ التطبيق جاهز - يستخدم خوادم Xirsys TURN (يدعم 4G)");
console.log(`📋 بيانات Xirsys: ${XIRSYS_USERNAME} / ${XIRSYS_CHANNEL}`);
</script>
</body>
</html>
