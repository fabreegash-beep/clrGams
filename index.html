let peerConnection;

// تحديث حالة الاتصال
function updateStatus(message, isError = false) {
  statusText.innerHTML = message;
  statusText.style.color = isError ? '#ff6b6b' : '#cbd5e1';
  console.log(`[Status] ${message}`);
}
 
// إضافة مسار إلى الاتصال
async function addTrackToConnection(track, stream) {
  if (peerConnection && track) {
    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === track.kind);
    if (sender) {
      await sender.replaceTrack(track);
      updateStatus(`✅ تم تحديث مسار ${track.kind === 'audio' ? 'الصوت' : 'الفيديو'}`);
    } else {
      peerConnection.addTrack(track, stream);
      updateStatus(`✅ تم إضافة مسار ${track.kind === 'audio' ? 'الصوت' : 'الفيديو'}`);
    }
  }
}
 
// تنظيف الاتصال
async function cleanupConnection() {
  if (videoStream) {
    videoStream.getTracks().forEach(track => track.stop());
    videoStream = null;
  }
  if (audioStream) {
    audioStream.getTracks().forEach(track => track.stop());
    audioStream = null;
  }
 
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
 
  isScreenSharing = false;
  isAudioSharing = false;
 
  if (roomId && !isHost) {
    const guestCandidatesRef = ref(db, `rooms/${roomId}/guestCandidates`);
    await remove(guestCandidatesRef);
  }
 
  // تنظيف الدردشة الصوتية
  await cleanupVoiceChat();
}
 
// ===========================================================
// ===================== الدردشة الصوتية ======================
// ===========================================================
let myVoiceId = null;
let myMicStream = null;
let isMicOn = false;
const voicePeers = {}; // voicePeers[peerId] = { pc, polite }
 
function genVoiceId() {
  return 'v_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
}
 
function ensureVoiceTile(peerId, label) {
  let tile = document.getElementById('voice-tile-' + peerId);
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'voice-tile';
    tile.id = 'voice-tile-' + peerId;
    tile.innerHTML = `🔊 <span>${label || 'مستخدم'}</span>`;
    voiceParticipants.appendChild(tile);
  }
  return tile;
}
 
function removeVoiceTile(peerId) {
  const tile = document.getElementById('voice-tile-' + peerId);
  if (tile) tile.remove();
  const audioEl = document.getElementById('voice-audio-' + peerId);
  if (audioEl) audioEl.remove();
}
 
function addAudioTrackToAllVoicePeers(track, stream) {
  Object.values(voicePeers).forEach(p => {
    if (!p.pc) return;
    const already = p.pc.getSenders().some(s => s.track === track);
    if (!already) p.pc.addTrack(track, stream);
  });
}
 
function removeAudioTrackFromAllVoicePeers() {
  Object.values(voicePeers).forEach(p => {
    if (!p.pc) return;
    p.pc.getSenders().filter(s => s.track && s.track.kind === 'audio').forEach(s => {
      try { p.pc.removeTrack(s); } catch (e) {}
    });
  });
}
 
function createVoicePeerConnection(peerId, initiator) {
  if (voicePeers[peerId] && voicePeers[peerId].pc) return voicePeers[peerId].pc;
 
  const pc = new RTCPeerConnection(iceServers);
  voicePeers[peerId] = { pc, makingOffer: false, polite: !initiator };
 
  // أضف مسار المايكروفون الحالي إن وُجد
  if (myMicStream) {
    myMicStream.getTracks().forEach(track => {
      const already = pc.getSenders().some(s => s.track === track);
      if (!already) pc.addTrack(track, myMicStream);
    });
  }
 
  pc.ontrack = (event) => {
    const remoteStream = event.streams[0];
    let audioEl = document.getElementById('voice-audio-' + peerId);
    if (!audioEl) {
      audioEl = document.createElement('audio');
      audioEl.id = 'voice-audio-' + peerId;
      audioEl.autoplay = true;
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
    }
    if (audioEl.srcObject !== remoteStream) {
      audioEl.srcObject = remoteStream;
      audioEl.play().catch(() => {});
    }
  };
 
  pc.onicecandidate = (event) => {
    if (event.candidate) {
      push(ref(db, `rooms/${roomId}/voiceSignals/${peerId}/${myVoiceId}/candidates`), event.candidate.toJSON());
    }
  };
 
  pc.onnegotiationneeded = async () => {
    try {
      voicePeers[peerId].makingOffer = true;
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await set(ref(db, `rooms/${roomId}/voiceSignals/${peerId}/${myVoiceId}/offer`), { type: offer.type, sdp: offer.sdp });
    } catch (e) {
      console.error("voice negotiation error", e);
    } finally {
      voicePeers[peerId].makingOffer = false;
    }
  };
 
  listenForVoiceSignals(peerId);
 
  return pc;
}
 
function listenForVoiceSignals(peerId) {
  onValue(ref(db, `rooms/${roomId}/voiceSignals/${myVoiceId}/${peerId}/offer`), async (snapshot) => {
    const offer = snapshot.val();
    if (!offer) return;
    const entry = voicePeers[peerId];
    const pc = entry && entry.pc;
    if (!pc) return;
 
    const collision = pc.signalingState !== 'stable';
    const polite = entry.polite;
 
    if (collision && !polite) return; // غير المهذب يتجاهل
 
    try {
      if (collision && polite) {
        await Promise.all([
          pc.setLocalDescription({ type: 'rollback' }),
          pc.setRemoteDescription(new RTCSessionDescription(offer))
        ]);
      } else {
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
      }
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await set(ref(db, `rooms/${roomId}/voiceSignals/${peerId}/${myVoiceId}/answer`), { type: answer.type, sdp: answer.sdp });
    } catch (e) {
      console.error("voice offer handling error", e);
    }
  });
 
  onValue(ref(db, `rooms/${roomId}/voiceSignals/${myVoiceId}/${peerId}/answer`), async (snapshot) => {
    const answer = snapshot.val();
    if (!answer) return;
    const pc = voicePeers[peerId] && voicePeers[peerId].pc;
    if (!pc) return;
    if (pc.signalingState === 'have-local-offer') {
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
      } catch (e) {
        console.error("voice answer handling error", e);
      }
    }
  });
 
  onChildAdded(ref(db, `rooms/${roomId}/voiceSignals/${myVoiceId}/${peerId}/candidates`), (snapshot) => {
    const pc = voicePeers[peerId] && voicePeers[peerId].pc;
    if (pc && snapshot.exists()) {
      pc.addIceCandidate(new RTCIceCandidate(snapshot.val())).catch(console.error);
    }
  });
}
 
function closeVoicePeerConnection(peerId) {
  const entry = voicePeers[peerId];
  if (!entry) return;
  if (entry.pc) entry.pc.close();
  removeVoiceTile(peerId);
  remove(ref(db, `rooms/${roomId}/voiceSignals/${myVoiceId}/${peerId}`)).catch(() => {});
  delete voicePeers[peerId];
}
 
function watchVoiceParticipants() {
  const participantsRef = ref(db, `rooms/${roomId}/voiceParticipants`);
 
  onChildAdded(participantsRef, (snapshot) => {
    const peerId = snapshot.key;
    if (peerId === myVoiceId) return;
    const data = snapshot.val() || {};
    ensureVoiceTile(peerId, data.name || 'مستخدم');
 
    const initiator = myVoiceId > peerId;
    createVoicePeerConnection(peerId, initiator);
  });
 
  onChildRemoved(participantsRef, (snapshot) => {
    const peerId = snapshot.key;
    if (peerId === myVoiceId) return;
    closeVoicePeerConnection(peerId);
  });
}
 
async function joinVoiceChannel() {
  if (!roomId) return;
  myVoiceId = genVoiceId();
 
  // اسم العرض في الدردشة الصوتية
  const label = isHost ? 'المضيف' : 'مشاهد';
  ensureVoiceTile(myVoiceId, `أنت (${label})`);
  document.getElementById('voice-tile-' + myVoiceId).querySelector('span').innerText = `أنت (${label})`;
 
  onDisconnect(ref(db, `rooms/${roomId}/voiceParticipants/${myVoiceId}`)).remove();
  onDisconnect(ref(db, `rooms/${roomId}/voiceSignals/${myVoiceId}`)).remove();
 
  await set(ref(db, `rooms/${roomId}/voiceParticipants/${myVoiceId}`), { name: label, ts: Date.now() });
 
  watchVoiceParticipants();
}
 
async function cleanupVoiceChat() {
  Object.keys(voicePeers).forEach(peerId => closeVoicePeerConnection(peerId));
  if (myMicStream) {
    myMicStream.getTracks().forEach(t => t.stop());
    myMicStream = null;
  }
  isMicOn = false;
  if (btnMic) {
    btnMic.textContent = "🎤 تشغيل المايك";
    btnMic.classList.remove('btn-active');
  }
  if (voiceParticipants) voiceParticipants.innerHTML = '';
  if (roomId && myVoiceId) {
    await remove(ref(db, `rooms/${roomId}/voiceParticipants/${myVoiceId}`)).catch(() => {});
    await remove(ref(db, `rooms/${roomId}/voiceSignals/${myVoiceId}`)).catch(() => {});
  }
  myVoiceId = null;
}
 
// زر تشغيل/إيقاف المايكروفون
if (btnMic) {
  btnMic.addEventListener('click', async () => {
    if (isMicOn) {
      if (myMicStream) myMicStream.getTracks().forEach(t => t.stop());
      myMicStream = null;
      isMicOn = false;
      btnMic.textContent = "🎤 تشغيل المايك";
      btnMic.classList.remove('btn-active');
      removeAudioTrackFromAllVoicePeers();
      updateStatus("🔇 تم إيقاف المايكروفون");
      return;
    }
 
    try {
      myMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      isMicOn = true;
      btnMic.textContent = "🔇 إيقاف المايك";
      btnMic.classList.add('btn-active');
      addAudioTrackToAllVoicePeers(myMicStream.getAudioTracks()[0], myMicStream);
      updateStatus("🎤 المايكروفون يعمل - يمكن للجميع سماعك");
    } catch (error) {
      updateStatus(`❌ فشل تشغيل المايك: ${error.message}`, true);
    }
  });
}

// 1. منطق المضيف
// ===========================================================
btnHost.addEventListener('click', async () => {
  try {
    await cleanupConnection();
    isHost = true;
    roomId = Math.floor(1000 + Math.random() * 9000).toString();
    displayRoomCode.innerText = roomId;
 
    switchScreen(welcomeScreen, roomScreen);
    hostControlArea.style.display = "block";
    remoteVideo.style.display = "none";
    sharedFrame.style.display = "none";
    updateStatus("✅ تم فتح الغرفة. شارك الكود مع أصدقائك.");
 
    // تنظيف الغرفة عند إغلاق المتصفح
    const roomRef = ref(db, `rooms/${roomId}`);
    await remove(roomRef);
    onDisconnect(roomRef).remove();
 
    // الانضمام لقناة الدردشة الصوتية
    await joinVoiceChannel();
 
  } catch (error) {
    updateStatus(`❌ خطأ: ${error.message}`, true);
  }
});
 
// زر مشاركة الشاشة (فيديو فقط بدون صوت)
btnShareScreen.addEventListener('click', async () => {
  updateStatus("🖥️ جاري مشاركة الشاشة...");
 
  try {
    // مشاركة الشاشة بدون صوت
    videoStream = await navigator.mediaDevices.getDisplayMedia({
      video: {
        frameRate: { ideal: 30, max: 60 },
        width: { ideal: 1920, max: 1920 },
        height: { ideal: 1080, max: 1080 }
      },
      audio: false // بدون صوت
    });
 
    isScreenSharing = true;
    updateStatus("✅ تم مشاركة الشاشة بنجاح! جاري إنشاء الاتصال...");
 
    if (!peerConnection) {
      await setupWebrtcAsHost();
    }
 
    // إضافة مسار الفيديو
    const videoTrack = videoStream.getVideoTracks()[0];
    await addTrackToConnection(videoTrack, videoStream);
 
    updateStatus("🎬 بث الشاشة يعمل الآن! يمكنك الآن إضافة صوت الجهاز.");
 
    // مراقبة انتهاء مشاركة الشاشة
    videoTrack.onended = () => {
      updateStatus("⚠️ توقفت مشاركة الشاشة", true);
      isScreenSharing = false;
      btnShareScreen.textContent = "🖥️ مشاركة الشاشة";
    };
 
    btnShareScreen.textContent = "✅ الشاشة قيد البث";
 
  } catch (error) {
    updateStatus(`❌ فشل مشاركة الشاشة: ${error.message}`, true);
  }
});
 
// زر بث صوت الجهاز (مستقل)
btnShareAudio.addEventListener('click', async () => {
  if (isAudioSharing) {
    // إيقاف الصوت
    if (audioStream) {
      audioStream.getTracks().forEach(track => track.stop());
      audioStream = null;
    }
    isAudioSharing = false;
    btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
    updateStatus("🔇 تم إيقاف بث صوت الجهاز");
 
    // إزالة مسار الصوت من الاتصال
    if (peerConnection) {
      const audioSenders = peerConnection.getSenders().filter(s => s.track && s.track.kind === 'audio');
      audioSenders.forEach(sender => {
        peerConnection.removeTrack(sender);
      });
    }
  } else {
    updateStatus("🎵 جاري تشغيل صوت الجهاز...");
 
    try {
      // طلب مشاركة صوت الجهاز فقط (بدون شاشة)
      // نستخدم getDisplayMedia مع شاشة صغيرة جداً للحصول على الصوت فقط
      const tempStream = await navigator.mediaDevices.getDisplayMedia({
        video: {
          width: { ideal: 1, max: 1 },
          height: { ideal: 1, max: 1 },
          frameRate: 1
        },
        audio: true // هذا يقوم ببث صوت الجهاز
      });
 
      // استخراج مسار الصوت فقط
      const audioTrack = tempStream.getAudioTracks()[0];
 
      if (audioTrack) {
        // إنشاء تيار جديد للصوت فقط
        audioStream = new MediaStream();
        audioStream.addTrack(audioTrack);
 
        isAudioSharing = true;
 
        if (!peerConnection) {
          await setupWebrtcAsHost();
        }
 
        // إضافة مسار الصوت
        await addTrackToConnection(audioTrack, audioStream);
 
        updateStatus("🎵 تم تشغيل صوت الجهاز! الضيوف الآن يسمعون صوت جهازك.");
        btnShareAudio.textContent = "🔇 إيقاف صوت الجهاز";
 
        // مراقبة انتهاء الصوت
        audioTrack.onended = () => {
          updateStatus("⚠️ توقف بث صوت الجهاز", true);
          isAudioSharing = false;
          btnShareAudio.textContent = "🎵 تشغيل صوت الجهاز";
        };
 
        // إيقاف تيار الفيديو المؤقت
        tempStream.getVideoTracks().forEach(track => track.stop());
 
      } else {
        updateStatus("❌ لم يتم العثور على مسار صوت", true);
        tempStream.getTracks().forEach(track => track.stop());
      }
 
    } catch (error) {
      updateStatus(`❌ فشل تشغيل صوت الجهاز: ${error.message}. تأكد من اختيار "مشاركة الصوت" في النافذة المنبثقة.`, true);
    }
  }
});
 
// رابط الموقع
btnSendUrl.addEventListener('click', async () => {
  let url = urlInput.value.trim();
  if (!url) {
    updateStatus("⚠️ الرجاء إدخال الرابط أولاً", true);
    return;
  }
 
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
 
  sharedFrame.src = url;
  sharedFrame.style.display = "block";
  updateStatus("📺 تم تحميل الموقع. يمكنك الآن مشاركة الشاشة والصوت.");
});
 
async function setupWebrtcAsHost() {
  peerConnection = new RTCPeerConnection(iceServers);
 
  peerConnection.onconnectionstatechange = () => {
    if (peerConnection.connectionState === 'connected') {
      updateStatus("✅ البث متصل بنجاح!");
    } else if (peerConnection.connectionState === 'failed') {
      updateStatus("❌ فشل الاتصال", true);
    }
  };
 
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      const candidateRef = ref(db, `rooms/${roomId}/hostCandidates/${Date.now()}`);
      set(candidateRef, event.candidate.toJSON());
    }
  };
 
  peerConnection.onnegotiationneeded = async () => {
    try {
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await update(ref(db, `rooms/${roomId}`), {
        offer: { type: offer.type, sdp: offer.sdp }
      });
    } catch (error) {
      console.error("Negotiation error:", error);
    }
  };
 
  // الاستماع لإجابات الضيف
  onValue(ref(db, `rooms/${roomId}/answer`), (snapshot) => {
    const answer = snapshot.val();
    if (answer && peerConnection && peerConnection.signalingState === 'have-local-offer') {
      peerConnection.setRemoteDescription(new RTCSessionDescription(answer))
        .then(() => updateStatus("✅ تم استلام رد الضيف"))
        .catch(console.error);
    }
  });
 
  // الاستماع لمرشحات الضيف
  onChildAdded(ref(db, `rooms/${roomId}/guestCandidates`), (snapshot) => {
    if (snapshot.exists() && peerConnection) {
      peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val()))
        .catch(console.error);
    }
  });
}
 
// 2. منطق الضيف
btnJoin.addEventListener('click', async () => {
  try {
    await cleanupConnection();
    isHost = false;
    roomId = roomCodeInput.value.trim();
 
    if (!roomId || roomId.length !== 4) {
      updateStatus("⚠️ كود الغرفة يجب أن يكون 4 أرقام", true);
      return;
    }
 
    updateStatus("🔍 جاري البحث عن الغرفة...");
 
    const roomSnapshot = await new Promise((resolve) => {
      onValue(ref(db, `rooms/${roomId}`), resolve, { onlyOnce: true });
    });
 
    if (!roomSnapshot.exists()) {
      updateStatus("❌ الغرفة غير موجودة. تأكد من الكود.", true);
      return;
    }
 
    switchScreen(welcomeScreen, roomScreen);
    displayRoomCode.innerText = roomId;
    sharedFrame.style.display = "none";
    remoteVideo.style.display = "block";
    document.getElementById('host-control-area').style.display = "none";
 
    updateStatus("📡 جاري الاتصال بالبث...");
    await setupWebrtcAsGuest();
 
    // الانضمام لقناة الدردشة الصوتية
    await joinVoiceChannel();
 
  } catch (error) {
    updateStatus(`❌ خطأ: ${error.message}`, true);
  }
});
 
async function setupWebrtcAsGuest() {
  peerConnection = new RTCPeerConnection(iceServers);
 
  peerConnection.ontrack = (event) => {
    if (event.streams && event.streams[0]) {
      if (remoteVideo.srcObject) {
        // دمج المسارات الجديدة مع الموجودة
        const existingStream = remoteVideo.srcObject;
        event.streams[0].getTracks().forEach(track => {
          existingStream.addTrack(track);
        });
      } else {
        remoteVideo.srcObject = event.streams[0];
      }
 
      remoteVideo.play().then(() => {
        const hasAudio = remoteVideo.srcObject.getAudioTracks().length > 0;
        updateStatus(`🎬 تم الاتصال!${hasAudio ? ' يتم سماع صوت الجهاز.' : ''}`);
      }).catch(() => {
        updateStatus("⚠️ انقر على الفيديو لبدء التشغيل", true);
      });
    }
  };
 
  peerConnection.onconnectionstatechange = () => {
    if (peerConnection.connectionState === 'connected') {
      updateStatus("✅ تم الاتصال بالبث بنجاح!");
    } else if (peerConnection.connectionState === 'failed') {
      updateStatus("❌ فشل الاتصال", true);
    }
  };
 
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      const candidateRef = ref(db, `rooms/${roomId}/guestCandidates/${Date.now()}`);
      set(candidateRef, event.candidate.toJSON());
    }
  };
 
  // الاستماع لعرض المضيف
  onValue(ref(db, `rooms/${roomId}/offer`), async (snapshot) => {
    const offer = snapshot.val();
    if (offer && peerConnection && peerConnection.signalingState === 'stable') {
      try {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        await update(ref(db, `rooms/${roomId}`), {
          answer: { type: answer.type, sdp: answer.sdp }
        });
        updateStatus("✅ تم إرسال الرد إلى المضيف");
      } catch (error) {
        console.error("Error:", error);
      }
    }
  });
 
  // الاستماع لمرشحات المضيف
  onChildAdded(ref(db, `rooms/${roomId}/hostCandidates`), (snapshot) => {
    if (snapshot.exists() && peerConnection) {
      peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val()))
        .catch(console.error);
    }
  });
 
  const offerSnapshot = await new Promise((resolve) => {
    onValue(ref(db, `rooms/${roomId}/offer`), resolve, { onlyOnce: true });
  });
 
  if (offerSnapshot.exists() && peerConnection.signalingState === 'stable') {
    const offer = offerSnapshot.val();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await update(ref(db, `rooms/${roomId}`), {
      answer: { type: answer.type, sdp: answer.sdp }
    });
  }
}
 
function switchScreen(hide, show) {
  hide.classList.remove('active');
  show.classList.add('active');
}
 
document.body.addEventListener('click', () => {
  if (remoteVideo.srcObject && remoteVideo.paused) {
    remoteVideo.play().catch(() => {});
  }
});
 
console.log("✅ التطبيق جاهز - بث منفصل للشاشة والصوت + دردشة صوتية");
</script>
